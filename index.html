<!-- Manifest injected by JS below (inline, no extra file needed) -->
<script>
(function(){
  // Generate icon as canvas data URL
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const r = size * 0.18;
    // Background
    ctx.fillStyle = '#080810';
    ctx.roundRect(0, 0, size, size, r);
    ctx.fill();
    // Gradient circle
    const grd = ctx.createRadialGradient(size*0.42, size*0.38, 0, size*0.5, size*0.5, size*0.48);
    grd.addColorStop(0, '#a695f5');
    grd.addColorStop(1, '#5b21b6');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(size*0.5, size*0.46, size*0.28, 0, Math.PI*2);
    ctx.fill();
    // Flask body
    const fs = size * 0.13;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.moveTo(size*0.38, size*0.28);
    ctx.lineTo(size*0.38, size*0.48);
    ctx.lineTo(size*0.26, size*0.66);
    ctx.quadraticCurveTo(size*0.22, size*0.74, size*0.30, size*0.74);
    ctx.lineTo(size*0.70, size*0.74);
    ctx.quadraticCurveTo(size*0.78, size*0.74, size*0.74, size*0.66);
    ctx.lineTo(size*0.62, size*0.48);
    ctx.lineTo(size*0.62, size*0.28);
    ctx.closePath();
    ctx.fill();
    // Flask neck top bar
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillRect(size*0.35, size*0.26, size*0.30, size*0.04);
    // Liquid inside flask
    const lg = ctx.createLinearGradient(0, size*0.55, 0, size*0.74);
    lg.addColorStop(0, '#2de2d5');
    lg.addColorStop(1, '#0891b2');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.moveTo(size*0.30, size*0.62);
    ctx.lineTo(size*0.27, size*0.68);
    ctx.quadraticCurveTo(size*0.23, size*0.74, size*0.31, size*0.74);
    ctx.lineTo(size*0.69, size*0.74);
    ctx.quadraticCurveTo(size*0.77, size*0.74, size*0.73, size*0.68);
    ctx.lineTo(size*0.70, size*0.62);
    ctx.closePath();
    ctx.fill();
    // Bubbles
    [[0.42,0.56,0.025],[0.52,0.60,0.018],[0.60,0.54,0.020]].forEach(([x,y,rad])=>{
      ctx.beginPath();
      ctx.arc(size*x, size*y, size*rad, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();
    });
    // App name
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold ${size*0.10}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('ChemSnap', size*0.5, size*0.88);
    return c.toDataURL('image/png');
  }

  // Sizes needed for Apple devices
  const sizes = [57,60,72,76,114,120,144,152,167,180,192,512];
  const icons = {};
  sizes.forEach(s => { icons[s] = makeIcon(s); });

  // Apple touch icons (must be in <head>)
  [[180,'apple-touch-icon'],[167,'apple-touch-icon',{sizes:'167x167'}],[152,'apple-touch-icon',{sizes:'152x152'}],[120,'apple-touch-icon',{sizes:'120x120'}]].forEach(([s,rel,extra])=>{
    const l = document.createElement('link');
    l.rel = rel;
    if (extra) Object.entries(extra).forEach(([k,v]) => l.setAttribute(k,v));
    l.href = icons[s];
    document.head.appendChild(l);
  });

  // Favicon
  const fav = document.createElement('link');
  fav.rel = 'icon'; fav.type = 'image/png'; fav.href = icons[192];
  document.head.appendChild(fav);

  // Web App Manifest (inline blob)
  const manifest = {
    name: 'ChemSnap – High School Chemistry',
    short_name: 'ChemSnap',
    description: 'Learn high school chemistry through beautiful swipeable lessons and quizzes.',
    start_url: './',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#080810',
    theme_color: '#080810',
    categories: ['education'],
    icons: sizes.map(s => ({ src: icons[s], sizes: `${s}x${s}`, type: 'image/png', purpose: s >= 192 ? 'any maskable' : 'any' })),
    screenshots: [
      { label: 'Lesson card', sizes: '390x844', type: 'image/png' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const murl = URL.createObjectURL(blob);
  const ml = document.createElement('link');
  ml.rel = 'manifest'; ml.href = murl;
  document.head.appendChild(ml);

  // Apple splash screens (generated canvas for key iPhone sizes)
  const splashSizes = [
    [430,932,'iPhone 14 Pro Max'],
    [393,852,'iPhone 14 Pro'],
    [390,844,'iPhone 14'],
    [375,812,'iPhone X/XS/11 Pro'],
    [414,896,'iPhone XR/11'],
    [428,926,'iPhone 12/13 Pro Max'],
  ];

  splashSizes.forEach(([w,h,label]) => {
    const c = document.createElement('canvas');
    c.width = w * 2; c.height = h * 2; // @2x
    const ctx = c.getContext('2d');
    // Background
    ctx.fillStyle = '#080810';
    ctx.fillRect(0,0,c.width,c.height);
    // Radial glow
    const grd = ctx.createRadialGradient(c.width/2, c.height*0.4, 0, c.width/2, c.height*0.4, c.width*0.7);
    grd.addColorStop(0, 'rgba(123,104,238,0.3)');
    grd.addColorStop(0.5, 'rgba(45,226,213,0.08)');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,c.width,c.height);
    // Icon
    const iconSize = Math.min(c.width, c.height) * 0.28;
    const ix = c.width/2 - iconSize/2;
    const iy = c.height/2 - iconSize/2 - c.height*0.06;
    // Draw icon bg
    ctx.save();
    ctx.shadowColor = 'rgba(123,104,238,0.5)';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#12122a';
    const rr = iconSize * 0.22;
    ctx.beginPath();
    ctx.roundRect(ix, iy, iconSize, iconSize, rr);
    ctx.fill();
    ctx.restore();
    // Draw icon flask (simplified)
    const ig = ctx.createRadialGradient(ix+iconSize*0.42, iy+iconSize*0.38, 0, ix+iconSize*0.5, iy+iconSize*0.5, iconSize*0.48);
    ig.addColorStop(0, '#a695f5');
    ig.addColorStop(1, '#5b21b6');
    ctx.fillStyle = ig;
    ctx.beginPath();
    ctx.arc(ix+iconSize*0.5, iy+iconSize*0.46, iconSize*0.28, 0, Math.PI*2);
    ctx.fill();
    // Flask white
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.moveTo(ix+iconSize*0.38, iy+iconSize*0.28);
    ctx.lineTo(ix+iconSize*0.38, iy+iconSize*0.48);
    ctx.lineTo(ix+iconSize*0.26, iy+iconSize*0.66);
    ctx.quadraticCurveTo(ix+iconSize*0.22, iy+iconSize*0.74, ix+iconSize*0.30, iy+iconSize*0.74);
    ctx.lineTo(ix+iconSize*0.70, iy+iconSize*0.74);
    ctx.quadraticCurveTo(ix+iconSize*0.78, iy+iconSize*0.74, ix+iconSize*0.74, iy+iconSize*0.66);
    ctx.lineTo(ix+iconSize*0.62, iy+iconSize*0.48);
    ctx.lineTo(ix+iconSize*0.62, iy+iconSize*0.28);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(ix+iconSize*0.35, iy+iconSize*0.26, iconSize*0.30, iconSize*0.04);
    // Liquid
    const tlg = ctx.createLinearGradient(0, iy+iconSize*0.55, 0, iy+iconSize*0.74);
    tlg.addColorStop(0, '#2de2d5'); tlg.addColorStop(1, '#0891b2');
    ctx.fillStyle = tlg;
    ctx.beginPath();
    ctx.moveTo(ix+iconSize*0.30, iy+iconSize*0.62);
    ctx.lineTo(ix+iconSize*0.27, iy+iconSize*0.68);
    ctx.quadraticCurveTo(ix+iconSize*0.23, iy+iconSize*0.74, ix+iconSize*0.31, iy+iconSize*0.74);
    ctx.lineTo(ix+iconSize*0.69, iy+iconSize*0.74);
    ctx.quadraticCurveTo(ix+iconSize*0.77, iy+iconSize*0.74, ix+iconSize*0.73, iy+iconSize*0.68);
    ctx.lineTo(ix+iconSize*0.70, iy+iconSize*0.62);
    ctx.closePath();
    ctx.fill();
    // App name
    ctx.fillStyle = '#f2f0ff';
    ctx.font = `800 ${c.width*0.085}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('ChemSnap', c.width/2, iy + iconSize + c.height*0.08);
    ctx.fillStyle = 'rgba(242,240,255,0.45)';
    ctx.font = `400 ${c.width*0.045}px -apple-system, sans-serif`;
    ctx.fillText('High School Chemistry', c.width/2, iy + iconSize + c.height*0.13);

    const splashURL = c.toDataURL('image/png');
    const sl = document.createElement('link');
    sl.rel = 'apple-touch-startup-image';
    sl.href = splashURL;
    sl.media = `(device-width: ${w}px) and (device-height: ${h}px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)`;
    document.head.appendChild(sl);
  });

  // Register service worker for offline use
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Inline SW as blob
      const swCode = `
const CACHE = 'chemsnap-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    const clone = res.clone();
    caches.open(CACHE).then(c => c.put(e.request, clone));
    return res;
  })));
});`;
      const swBlob = new Blob([swCode], {type:'application/javascript'});
      const swURL = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swURL, {scope: './'})
        .then(() => console.log('ChemSnap SW registered'))
        .catch(e => console.log('SW skipped:', e));
    });
  }
})();
</script>

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #000; }

/* ===== DESIGN TOKENS ===== */
:root {
  --bg: #080810;
  --surface: #10101e;
  --surface2: #16162a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f2f0ff;
  --muted: rgba(242,240,255,0.45);
  --muted2: rgba(242,240,255,0.65);

  --violet: #7b68ee;
  --violet-light: #a695f5;
  --violet-dim: rgba(123,104,238,0.18);
  --teal: #2de2d5;
  --teal-dim: rgba(45,226,213,0.15);
  --coral: #ff6b6b;
  --coral-dim: rgba(255,107,107,0.15);
  --gold: #ffc93c;
  --gold-dim: rgba(255,201,60,0.15);
  --green: #43e97b;
  --green-dim: rgba(67,233,123,0.12);
  --blue: #4facfe;
  --blue-dim: rgba(79,172,254,0.15);

  --radius: 22px;
  --radius-sm: 12px;
  --radius-pill: 50px;

  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;

  /* Safe areas for iPhone */
  --sat: env(safe-area-inset-top, 44px);
  --sab: env(safe-area-inset-bottom, 34px);
}

/* ===== PAGE WRAPPER (Desktop: phone mockup | Mobile: full screen) ===== */
body { display: flex; align-items: center; justify-content: center; background: #000; }

#phone-shell {
  position: relative;
  width: 100%;
  max-width: 430px;
  height: 100vh;
  max-height: 932px;
  overflow: hidden;
  background: var(--bg);
}

/* Desktop: show iPhone frame */
@media (min-width: 500px) and (min-height: 780px) {
  body { background: #0a0a0a; }
  #phone-shell {
    width: 390px;
    height: 844px;
    border-radius: 52px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12),
      0 0 0 10px #1a1a1a,
      0 0 0 11px rgba(255,255,255,0.06),
      0 40px 80px rgba(0,0,0,0.8),
      0 0 120px rgba(123,104,238,0.12);
    overflow: hidden;
  }
  /* Dynamic island */
  #phone-shell::before {
    content: '';
    position: absolute;
    top: 13px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 9999;
  }
  /* Side buttons */
  body::before {
    content: '';
    position: fixed;
    left: calc(50% - 195px - 4px);
    top: calc(50% - 422px + 160px);
    width: 4px; height: 32px;
    background: #2a2a2a;
    border-radius: 2px 0 0 2px;
    box-shadow: 0 44px 0 #2a2a2a, 0 84px 0 #2a2a2a;
  }
  body::after {
    content: '';
    position: fixed;
    right: calc(50% - 195px - 4px);
    top: calc(50% - 422px + 200px);
    width: 4px; height: 64px;
    background: #2a2a2a;
    border-radius: 0 2px 2px 0;
  }
}

/* ===== APP CONTAINER ===== */
#app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ===== STATUS BAR ===== */
#status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 28px 8px;
  pointer-events: none;
}
@media (min-width: 500px) { #status-bar { height: 60px; padding-top: 16px; } }
.status-time { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); }
.status-icons { display: flex; gap: 6px; align-items: center; }
.status-icons svg { fill: var(--text); }

/* ===== NAVIGATION BAR ===== */
#nav-bar {
  position: absolute;
  top: 54px; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px 10px;
  background: linear-gradient(to bottom, rgba(8,8,16,0.96) 0%, rgba(8,8,16,0) 100%);
}
@media (min-width: 500px) { #nav-bar { top: 60px; } }

.logo-mark {
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--violet-dim);
  border: 1px solid rgba(123,104,238,0.3);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.logo-text {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo-text span { color: var(--violet-light); }

#dots-row { display: flex; gap: 4px; align-items: center; }
.pdot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.pdot.seen { background: var(--teal); opacity: 0.7; }
.pdot.active { background: var(--violet-light); width: 16px; border-radius: 3px; opacity: 1; }
.pdot.quiz-type { background: rgba(255,107,107,0.3); }
.pdot.quiz-type.seen { background: var(--coral); opacity: 0.7; }
.pdot.quiz-type.active { background: var(--coral); width: 16px; border-radius: 3px; }

#xp-chip {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,201,60,0.1);
  border: 1px solid rgba(255,201,60,0.25);
  border-radius: 20px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  active: scale(0.96);
}
#xp-chip:active { transform: scale(0.94); }
.xp-star { font-size: 13px; }
#xp-txt { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--gold); }

/* ===== FEED ===== */
#feed {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

/* ===== CARDS ===== */
.card {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: transform;
  touch-action: none;
}
.card.active { transform: translateY(0); }
.card.exit-up { transform: translateY(-100%); }
.card.instant { transition: none; }

/* Card layers */
.card-bg { position: absolute; inset: 0; z-index: 0; }
.card-art { position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.card-gradient {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 65%;
  z-index: 2;
  pointer-events: none;
}
.card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 3;
  padding: 0 20px calc(var(--sab, 34px) + 90px) 20px;
}

/* ===== LESSON CARD STYLES ===== */
.lesson-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: var(--radius-pill);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.lesson-num {
  position: absolute;
  top: 70px; right: 20px;
  font-family: var(--font-display);
  font-size: 80px;
  font-weight: 800;
  opacity: 0.06;
  line-height: 1;
  color: white;
  z-index: 1;
  letter-spacing: -4px;
  pointer-events: none;
}
.lesson-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.8px;
  margin-bottom: 12px;
  color: var(--text);
}
.lesson-body {
  font-family: var(--font-body);
  font-size: 14.5px;
  line-height: 1.65;
  color: var(--muted2);
  margin-bottom: 16px;
}
.lesson-body strong { color: var(--text); font-weight: 500; }

.facts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.fact-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 10px 12px;
  backdrop-filter: blur(10px);
}
.fact-label { font-family: var(--font-body); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 3px; }
.fact-val { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--text); }

/* Swipe hint */
.swipe-cue {
  position: absolute;
  bottom: calc(var(--sab, 34px) + 72px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  opacity: 0;
  animation: fade-cue 3s 1.5s ease-in-out forwards;
}
@keyframes fade-cue {
  0% { opacity: 0; transform: translateX(-50%) translateY(8px); }
  30% { opacity: 1; transform: translateX(-50%) translateY(0); }
  70% { opacity: 1; }
  100% { opacity: 0; }
}
.swipe-arrow {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  animation: bounce-arrow 1.2s ease-in-out infinite;
}
@keyframes bounce-arrow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.swipe-label { font-family: var(--font-body); font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

/* ===== QUIZ CARD STYLES ===== */
.quiz-card-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: calc(var(--sat, 44px) + 72px) 20px calc(var(--sab, 34px) + 16px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.quiz-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--coral-dim);

.quiz-question {

.options-list { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
.opt {

  border-radius: 16px;

  width: 100%;
}
.opt:active { transform: scale(0.98); }
.opt-key {

}
.opt.correct-opt .opt-key { background: var(--teal); border-color: var(--teal); color: #000; }
.opt.wrong-opt {

.feedback-box {

  padding: 12px 14px;

  border: 1px solid rgba(255,255,255,0.08);

  font-size: 13px;
  line-height: 1.55;

}
.feedback-box.show { opacity: 1; transform: translateY(0); }

.continue-btn {

  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  letter-spacing: 0.2px;

  transform: translateY(8px);

  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.continue-btn.show { opacity: 1; transform: translateY(0); }
.continue-btn:active { transform: scale(0.98); }

.final-inner {

  flex-direction: column;
  align-items: center;

}
.final-ring-wrap {

}
.final-ring-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 10; }

.ring-pct { font-family: var(--font-display); font-size: 36px; font-weight: 800; color: var(--text); }

.final-grade { font-family: var(--font-display); font-size: 26px; font-weight: 800; margin-bottom: 8px; }
.final-msg { font-family: var(--font-body); font-size: 14px; color: var(--muted2); line-height: 1.5; margin-bottom: 24px; max-width: 280px; }
.final-stats { display: flex; gap: 12px; margin-bottom: 28px; }
.fstat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 20px;
  text-align: center;
  flex: 1;
}
.fstat-n { font-family: var(--font-display); font-size: 24px; font-weight: 800; margin-bottom: 2px; }
.fstat-l { font-family: var(--font-body); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }
.final-btn {
  background: var(--violet-dim);

  color: var(--violet-light);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;

}

/* ===== BOTTOM NAV ===== */
#bottom-nav {

  justify-content: space-around;

.nav-btn {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  padding: 6px 16px;
  border-radius: 14px;

  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  background: none;
  border: none;
}
.nav-btn:active { transform: scale(0.9); }
.nav-icon { font-size: 22px; line-height: 1; }

}
.stat-n { font-family: var(--font-display); font-size: 26px; font-weight: 800; margin-bottom: 2px; }
.stat-l { font-family: var(--font-body); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }

.section-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--muted2); margin-bottom: 10px; letter-spacing: -0.2px; }

.lesson-tile {
  background: var(--surface2);
  border: 1px solid var(--border);

}

.lt-icon {

}
.lt-info { flex: 1; min-width: 0; }

.lt-tag { font-family: var(--font-body); font-size: 11px; color: var(--muted); }
.lt-status {

}
.s-done { background: rgba(45,226,213,0.12); color: var(--teal); }
.s-now { background: var(--violet-dim); color: var(--violet-light); }
.s-lock { background: rgba(255,255,255,0.05); color: var(--muted); }

.quiz-result-tile {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
}
.qrt-row {

  font-size: 13px;
}
.qrt-row:last-child { border-bottom: none; }
.qrt-mark {
  width: 22px; height: 22px; flex-shrink: 0;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  margin-top: 1px;
}
.qm-ok { background: rgba(45,226,213,0.2); color: var(--teal); }
.qm-no { background: rgba(255,107,107,0.2); color: var(--coral); }
.qm-blank { background: rgba(255,255,255,0.05); color: var(--muted); }
.qrt-q { flex: 1; color: var(--muted2); line-height: 1.4; }
.qrt-pts { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--gold); flex-shrink: 0; margin-top: 1px; }

/* ===== PARTICLE BACKGROUND ===== */
#particles { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute;
  border-radius: 50%;
  animation: float-particle linear infinite;
  opacity: 0;
}
@keyframes float-particle {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: var(--op); }
  90% { opacity: var(--op); }
  100% { transform: translateY(-20px) scale(1); opacity: 0; }
}

/* ===== TOAST ===== */
#toast {
  position: absolute;
  top: calc(var(--sat, 44px) + 60px);
  left: 50%; transform: translateX(-50%) translateY(-20px);
  background: rgba(22,22,42,0.95);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 8px 18px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  z-index: 2000;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  backdrop-filter: blur(16px);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== ILLUSTRATIONS ===== */
.art-container {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 20px 280px;
}
.art-container svg { max-width: 100%; max-height: 100%; }

/* ===== SCROLL OVERLAY ===== */
#touch-overlay {
  position: absolute;
  inset: 0;
  z-index: 50;
  touch-action: none;
}

/* ===== ANIMATIONS ===== */
@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.8); opacity: 0; }
}
@keyframes enter-content {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.card.active .card-info { animation: enter-content 0.5s 0.2s ease both; }
.card.active .quiz-card-inner { animation: enter-content 0.5s 0.1s ease both; }

/* ===== SCROLLBAR HIDE ===== */
* { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { display: none; }

@keyframes slideUpBanner {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
</style>

(function(){
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
  const isStandalone = ('standalone' in navigator && navigator.standalone) || window.matchMedia('(display-mode:standalone)').matches;
  if (isIOS && !isStandalone && !sessionStorage.getItem('a2hs-gone')) {
    setTimeout(() => {
      const b = document.getElementById('a2hs-banner');
      if (b) { b.style.display = 'flex'; b.style.animation = 'slideUpBanner 0.45s cubic-bezier(0.16,1,0.3,1) both'; }
    }, 5000);
  }
})();
function dismissA2HS() {
  const b = document.getElementById('a2hs-banner');
  if (!b) return;
  b.style.transition = 'transform 0.3s ease,opacity 0.3s ease';
  b.style.transform = 'translateY(110%)';
  b.style.opacity = '0';
  setTimeout(() => { b.style.display = 'none'; }, 320);
  sessionStorage.setItem('a2hs-gone', '1');
}
</script>

// ===================== STATE =====================
let currentIdx = 0;
let quizAnswers = new Array(QUIZ.length).fill(null);
let xp = 0;
let touchStartY = 0;
let touchStartTime = 0;
let isAnimating = false;

const totalCards = LESSONS.length + QUIZ.length + 1;

// ===================== INIT =====================
function init() {
  updateClock();
  setInterval(updateClock, 10000);
  buildDots();
  buildCards();
  bindSwipe();
}

function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  document.getElementById('clock').textContent = `${h}:${m < 10 ? '0' + m : m}`;
}

function buildDots() {
  const row = document.getElementById('dots-row');
  row.innerHTML = '';
  for (let i = 0; i < totalCards; i++) {
    const d = document.createElement('div');
    const isQuiz = i >= LESSONS.length && i < LESSONS.length + QUIZ.length;
    const isFinal = i === totalCards - 1;
    d.className = 'pdot' + (isQuiz || isFinal ? ' quiz-type' : '') + (i === 0 ? ' active' : '');
    row.appendChild(d);
  }
}

function buildCards() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  LESSONS.forEach((l, i) => {
    const el = document.createElement('div');
    el.className = 'card' + (i === 0 ? ' active' : '');
    el.id = 'c' + i;
    el.innerHTML = lessonHTML(l, i);
    feed.appendChild(el);
  });
  QUIZ.forEach((q, i) => {
    const idx = LESSONS.length + i;
    const el = document.createElement('div');
    el.className = 'card';
    el.id = 'c' + idx;
    el.innerHTML = quizHTML(q, i, idx);
    feed.appendChild(el);
  });
  const finalEl = document.createElement('div');
  finalEl.className = 'card';
  finalEl.id = 'c' + (totalCards - 1);
  finalEl.innerHTML = finalHTML();
  feed.appendChild(finalEl);
}

function lessonHTML(l, i) {
  const facts = l.facts.map(f => `<div class="fact-card"><div class="fact-label">${f.l}</div><div class="fact-val">${f.v}</div></div>`).join('');
  return `
    <div class="card-bg" style="background:${l.bg}"></div>
    <div class="card-art"><div class="art-container">${l.art}</div></div>
    <div class="card-gradient" style="${l.grad ? 'background:' + l.grad : ''}"></div>
    <div class="lesson-num">${String(i + 1).padStart(2, '0')}</div>
    <div class="card-info">
      <div class="lesson-tag" style="background:${l.accentDim};border-color:${l.accent}40;color:${l.accent}">${l.emoji} ${l.tag}</div>
      <div class="lesson-title">${l.title}</div>
      <div class="lesson-body">${l.body}</div>
      <div class="facts-row">${facts}</div>
    </div>
    ${i === 0 ? `<div class="swipe-cue"><div class="swipe-arrow">↑</div><div class="swipe-label">SWIPE UP</div></div>` : ''}
  `;
}

function quizHTML(q, qIdx, cardIdx) {
  const letters = ['A','B','C','D'];
  const pct = Math.round((qIdx / QUIZ.length) * 100);
  const opts = q.opts.map((o, i) => `
    <button class="opt" id="opt-${cardIdx}-${i}" onclick="handleAnswer(${cardIdx},${qIdx},${i})" aria-label="${letters[i]}: ${o}">
      <span class="opt-key">${letters[i]}</span>
      <span class="opt-text">${o}</span>
    </button>`).join('');
  return `
    <div class="card-bg" style="background:radial-gradient(ellipse at 40% 20%, rgba(255,107,107,0.15) 0%, transparent 55%), radial-gradient(ellipse at 70% 80%, rgba(123,104,238,0.1) 0%, transparent 50%), #0c0812"></div>
    <div class="quiz-card-inner">
      <div class="quiz-badge">🧪 Question ${qIdx + 1} of ${QUIZ.length}</div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-question">${q.q}</div>
      <div class="options-list">${opts}</div>
      <div class="feedback-box" id="fb${cardIdx}">${q.explain}</div>
      <button class="continue-btn" id="cont${cardIdx}" onclick="goNext()">
        ${qIdx < QUIZ.length - 1 ? 'Next Question →' : 'See My Results →'}
      </button>
    </div>
  `;
}

function finalHTML() {
  return `

// ===================== NAVIGATION =====================
function goNext() {
  goToCard(currentIdx + 1);
}

function goToCard(idx) {
  if (idx < 0 || idx >= totalCards || isAnimating || idx === currentIdx) return;
  isAnimating = true;
  const from = document.getElementById('c' + currentIdx);
  const to = document.getElementById('c' + idx);
  if (!from || !to) { isAnimating = false; return; }

  from.classList.add('exit-up');
  from.classList.remove('active');
  to.classList.add('active');
  currentIdx = idx;

  if (document.getElementById('c' + currentIdx)?.querySelector('.final-inner')) {
    computeFinal();
  }
  updateDots();
  updateXP();

  setTimeout(() => {
    from.classList.remove('exit-up');
    isAnimating = false;
  }, 520);
}

function updateDots() {
  document.querySelectorAll('.pdot').forEach((d, i) => {
    d.classList.remove('active', 'seen');
    if (i < currentIdx) d.classList.add('seen');
    if (i === currentIdx) d.classList.add('active');
  });
}

function updateXP() {
  document.getElementById('xp-txt').textContent = xp + ' XP';
}

// ===================== QUIZ LOGIC =====================
function handleAnswer(cardIdx, qIdx, optIdx) {
  if (quizAnswers[qIdx] !== null) return;
  const q = QUIZ[qIdx];
  const correct = optIdx === q.ans;
  quizAnswers[qIdx] = { chosen: optIdx, correct };
  if (correct) {
    xp += 100;
    showToast('✅ Correct! +100 XP');
  } else {
    showToast('❌ Not quite. Check the explanation!');
  }

  for (let i = 0; i < q.opts.length; i++) {
    const btn = document.getElementById(`opt-${cardIdx}-${i}`);
    if (!btn) continue;
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct-opt');
    else if (i === optIdx && !correct) btn.classList.add('wrong-opt');
    else btn.classList.add('dim-opt');
  }
  const fb = document.getElementById('fb' + cardIdx);
  if (fb) fb.classList.add('show');
  const cont = document.getElementById('cont' + cardIdx);
  if (cont) cont.classList.add('show');
  updateXP();
}

function computeFinal() {
  const correct = quizAnswers.filter(a => a && a.correct).length;
  const total = QUIZ.length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('final-pct').textContent = pct + '%';
  document.getElementById('f-correct').textContent = correct + '/' + total;
  document.getElementById('f-xp').textContent = xp;

  let grade = '', msg = '', col = '#7b68ee';
  if (pct === 100) { grade = 'Perfect Score! 🏆'; msg = "Flawless! You've completely mastered high school chemistry fundamentals."; col = '#ffc93c'; }
  else if (pct >= 80) { grade = 'Excellent! ⚗️'; msg = 'Outstanding work! You have a strong command of chemistry.'; col = '#2de2d5'; }
  else if (pct >= 60) { grade = 'Good Job! 📚'; msg = 'Solid understanding. A bit more review and you\'ll be chemistry royalty!'; col = '#a78bfa'; }
  else { grade = 'Keep Learning! 💪'; msg = 'Chemistry takes practice. Review the lessons and give it another go!'; col = '#ff6b6b'; }

  document.getElementById('final-grade').textContent = grade;
  document.getElementById('final-msg').textContent = msg;

  const ring = document.getElementById('ring-fill');
  if (ring) {
    ring.setAttribute('stroke', col);
    const circ = 364.4;
    setTimeout(() => { ring.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(0.34,1.2,0.64,1)'; ring.setAttribute('stroke-dashoffset', circ * (1 - pct / 100)); }, 150);
  }
}

// ===================== BOTTOM NAV =====================
function navHome() {
  setNavActive('nav-home');
  if (currentIdx < LESSONS.length) return;
  goToCard(0);
}

function navQuiz() {
  setNavActive('nav-quiz');
  const firstQuiz = LESSONS.length;
  if (currentIdx >= firstQuiz) return;
  goToCard(firstQuiz);
}

function setNavActive(id) {
  ['nav-home','nav-quiz','nav-progress'].forEach(n => {
    document.getElementById(n)?.classList.remove('active');
  });
  document.getElementById(id)?.classList.add('active');
}

        <div class="stat-tile"><div class="stat-n" style="color:#2de2d5">${lessonsDone}</div><div class="stat-l">Lessons</div></div>
        <div class="stat-tile"><div class="stat-n" style="color:#ffc93c">${xp}</div><div class="stat-l">XP Points</div></div>
        <div class="stat-tile"><div class="stat-n" style="color:#ff6b6b">${quizDone > 0 ? Math.round(correct / quizDone * 100) : 0}%</div><div class="stat-l">Quiz Score</div></div>
      </div>

      <div>
        <div class="section-title">📖 Lesson Map</div>
        <div>
          ${LESSONS.map((l, i) => {
            const done = i < currentIdx;
            const active = i === currentIdx;
            let sc = 's-lock', st = 'Locked';
            if (done) { sc = 's-done'; st = 'Done ✓'; }
            else if (active) { sc = 's-now'; st = 'Now'; }
            return `<div class="lesson-tile">
              <div class="lt-icon" style="background:${l.accentDim}">${icons[i]}</div>
              <div class="lt-info">
                <div class="lt-name">${l.title.split(':')[0]}</div>
                <div class="lt-tag">${l.tag}</div>
              </div>
              <span class="lt-status ${sc}">${st}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      ${quizAnswers.some(Boolean) ? `
      <div>
        <div class="section-title">🧪 Quiz Results</div>
        <div class="quiz-result-tile">
          ${QUIZ.map((q, i) => {
            const a = quizAnswers[i];
            let cls = 'qm-blank', mark = '–', pts = '';
            if (a) {
              cls = a.correct ? 'qm-ok' : 'qm-no';
              mark = a.correct ? '✓' : '✗';
              pts = a.correct ? '+100' : '0';
            }
            return `<div class="qrt-row">
              <div class="qrt-mark ${cls}">${mark}</div>
              <div class="qrt-q">Q${i + 1}: ${q.q.substring(0, 55)}${q.q.length > 55 ? '…' : ''}</div>
              ${pts ? `<div class="qrt-pts">${pts}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>` : `<div style="text-align:center;padding:20px;color:var(--muted);font-family:var(--font-body);font-size:13px">Complete the lessons to unlock the quiz!</div>`}
    </div>
  `;
  ps.classList.add('open');
  setNavActive('nav-progress');
}

function closeProgress() {
  document.getElementById('progress-screen').classList.remove('open');
  const isQuiz = currentIdx >= LESSONS.length;
  setNavActive(isQuiz ? 'nav-quiz' : 'nav-home');
}

// ===================== TOUCH/SWIPE =====================
function bindSwipe() {
  const overlay = document.getElementById('touch-overlay');
  let startY = 0, startTime = 0, isDragging = false;

  overlay.addEventListener('touchstart', e => {
    // Don't hijack quiz card touches (they need scroll)
    const isQuizCard = currentIdx >= LESSONS.length && currentIdx < totalCards - 1;
    if (isQuizCard) return;
    startY = e.touches[0].clientY;
    startTime = Date.now();
    isDragging = true;
  }, { passive: true });

  overlay.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    const dy = startY - e.changedTouches[0].clientY;
    const dt = Date.now() - startTime;
    const isQuizCard = currentIdx >= LESSONS.length && currentIdx < totalCards - 1;
    if (isQuizCard) return;
    if (dy > 60 || (dy > 30 && dt < 300)) goNext();
  }, { passive: true });

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') { e.preventDefault(); if (currentIdx > 0) goToCard(currentIdx - 1); }
  });

  // Mouse wheel for desktop
  let wheelLock = false;
  overlay.addEventListener('wheel', e => {
    if (wheelLock) return;
    if (e.deltaY > 40) { goNext(); wheelLock = true; setTimeout(() => { wheelLock = false; }, 600); }
    if (e.deltaY < -40 && currentIdx > 0) { goToCard(currentIdx - 1); wheelLock = true; setTimeout(() => { wheelLock = false; }, 600); }
  }, { passive: true });
}

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ===================== START =====================
init();
</script>

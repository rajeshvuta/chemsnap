<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ChemSnap">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080810">
<meta name="description" content="25 swipeable high school chemistry lessons + quiz.">
<title>ChemSnap – High School Chemistry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- PWA icons + manifest injected after DOM ready -->
<script>
window.addEventListener('DOMContentLoaded',function(){
  function makeIcon(sz){
    var c=document.createElement('canvas');c.width=c.height=sz;
    var x=c.getContext('2d'),r=sz*0.18;
    x.fillStyle='#080810';x.beginPath();x.roundRect(0,0,sz,sz,r);x.fill();
    var g=x.createRadialGradient(sz*.42,sz*.38,0,sz*.5,sz*.5,sz*.46);
    g.addColorStop(0,'#a695f5');g.addColorStop(1,'#5b21b6');
    x.fillStyle=g;x.beginPath();x.arc(sz*.5,sz*.46,sz*.27,0,Math.PI*2);x.fill();
    x.fillStyle='rgba(255,255,255,0.92)';
    x.beginPath();x.moveTo(sz*.38,sz*.28);x.lineTo(sz*.38,sz*.48);x.lineTo(sz*.26,sz*.66);
    x.quadraticCurveTo(sz*.22,sz*.74,sz*.30,sz*.74);x.lineTo(sz*.70,sz*.74);
    x.quadraticCurveTo(sz*.78,sz*.74,sz*.74,sz*.66);x.lineTo(sz*.62,sz*.48);x.lineTo(sz*.62,sz*.28);x.closePath();x.fill();
    x.fillRect(sz*.35,sz*.26,sz*.30,sz*.04);
    var lg=x.createLinearGradient(0,sz*.55,0,sz*.74);lg.addColorStop(0,'#2de2d5');lg.addColorStop(1,'#0891b2');
    x.fillStyle=lg;x.beginPath();x.moveTo(sz*.30,sz*.62);x.lineTo(sz*.27,sz*.68);
    x.quadraticCurveTo(sz*.23,sz*.74,sz*.31,sz*.74);x.lineTo(sz*.69,sz*.74);
    x.quadraticCurveTo(sz*.77,sz*.74,sz*.73,sz*.68);x.lineTo(sz*.70,sz*.62);x.closePath();x.fill();
    x.fillStyle='rgba(255,255,255,0.9)';x.font='bold '+(sz*.1)+'px sans-serif';x.textAlign='center';x.fillText('ChemSnap',sz*.5,sz*.89);
    return c.toDataURL('image/png');
  }
  var ic=makeIcon(192);
  ['apple-touch-icon','shortcut icon'].forEach(function(r,i){
    var l=document.createElement('link');l.rel=r;if(i)l.type='image/png';l.href=ic;document.head.appendChild(l);
  });
  var mf={name:'ChemSnap – Chemistry',short_name:'ChemSnap',start_url:'./',display:'standalone',orientation:'portrait',background_color:'#080810',theme_color:'#080810',
    icons:[{src:ic,sizes:'192x192',type:'image/png',purpose:'any maskable'}]};
  var bl=new Blob([JSON.stringify(mf)],{type:'application/manifest+json'});
  var ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(bl);document.head.appendChild(ml);

  // iOS A2HS hint after 6s
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  var standalone=navigator.standalone||window.matchMedia('(display-mode:standalone)').matches;
  if(isIOS&&!standalone&&!sessionStorage.getItem('a2hs')){
    setTimeout(function(){var b=document.getElementById('a2hs');if(b)b.style.display='flex';},6000);
  }
});
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:#000;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
:root{
  --bg:#080810;--s2:#16162a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --tx:#f2f0ff;--mu:rgba(242,240,255,0.45);--mu2:rgba(242,240,255,0.7);
  --v:#7b68ee;--vl:#a695f5;--vd:rgba(123,104,238,0.18);
  --tl:#2de2d5;--td:rgba(45,226,213,0.15);
  --co:#ff6b6b;--cd:rgba(255,107,107,0.15);
  --go:#ffc93c;--gd:rgba(255,201,60,0.15);
  --gr:#43e97b;--grd:rgba(67,233,123,0.12);
  --bl:#4facfe;--bld:rgba(79,172,254,0.15);
  --sat:env(safe-area-inset-top,44px);--sab:env(safe-area-inset-bottom,34px);
  --f1:'Plus Jakarta Sans',sans-serif;--f2:'DM Sans',sans-serif;
}

body{display:flex;align-items:center;justify-content:center}

#shell{
  position:relative;width:100%;max-width:430px;
  height:100vh;max-height:932px;
  overflow:hidden;background:var(--bg);
}

/* Desktop iPhone frame */
@media(min-width:500px) and (min-height:780px){
  body{background:#060606}
  #shell{
    width:390px;height:844px;border-radius:52px;
    box-shadow:0 0 0 1px rgba(255,255,255,0.12),0 0 0 10px #1a1a1a,0 0 0 11px rgba(255,255,255,0.06),0 40px 90px rgba(0,0,0,0.85),0 0 100px rgba(123,104,238,0.1);
  }
  #shell::before{content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:34px;background:#000;border-radius:18px;z-index:9999}
  body::before{content:'';position:fixed;left:calc(50% - 199px);top:calc(50% - 422px + 155px);width:4px;height:30px;background:#222;border-radius:2px 0 0 2px;box-shadow:0 44px 0 #222,0 82px 0 #222}
  body::after{content:'';position:fixed;right:calc(50% - 199px);top:calc(50% - 422px + 195px);width:4px;height:62px;background:#222;border-radius:0 2px 2px 0}
}

#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Status bar */
#sb{position:absolute;top:0;left:0;right:0;height:54px;z-index:1000;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;pointer-events:none}
@media(min-width:500px){#sb{height:60px;padding-top:14px}}
.st{font-family:var(--f1);font-size:15px;font-weight:700;color:var(--tx);letter-spacing:0}
.si{display:flex;gap:6px;align-items:center}
.si svg{fill:var(--tx)}

/* Nav bar */
#nb{position:absolute;top:54px;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 18px 10px;background:linear-gradient(to bottom,rgba(8,8,16,0.97) 0%,rgba(8,8,16,0) 100%)}
@media(min-width:500px){#nb{top:60px}}
.lm{display:flex;align-items:center;gap:8px}
.li{width:32px;height:32px;background:var(--vd);border:1px solid rgba(123,104,238,0.3);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.lt{font-family:var(--f1);font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--tx)}
.lt span{color:var(--vl)}
#dr{display:flex;gap:3px;align-items:center;flex-wrap:nowrap;max-width:140px;overflow:hidden}
.pd{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.16);transition:all 0.32s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0}
.pd.seen{background:var(--tl);opacity:.65}
.pd.active{background:var(--vl);width:14px;border-radius:3px;opacity:1}
.pd.qt{background:rgba(255,107,107,0.25)}
.pd.qt.seen{background:var(--co);opacity:.65}
.pd.qt.active{background:var(--co);width:14px;border-radius:3px}
#xc{display:flex;align-items:center;gap:5px;background:rgba(255,201,60,0.1);border:1px solid rgba(255,201,60,0.25);border-radius:20px;padding:5px 10px;cursor:pointer;transition:transform .2s}
#xc:active{transform:scale(0.93)}
#xt{font-family:var(--f1);font-size:13px;font-weight:700;color:var(--go)}

/* Feed + Cards */
#feed{position:absolute;inset:0;overflow:hidden}
.card{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;transform:translateY(100%);transition:transform .5s cubic-bezier(0.16,1,0.3,1);will-change:transform}
.card.active{transform:translateY(0)}
.card.exit-up{transform:translateY(-100%)}

/* Lesson card layers */
.cbg{position:absolute;inset:0;z-index:0}
/* Art: top 52% of card, shifted up slightly */
.cart{position:absolute;top:0;left:0;right:0;height:52%;z-index:1;display:flex;align-items:center;justify-content:center;padding:100px 16px 0}
.cart svg{width:100%;height:100%;max-height:220px}
/* Gradient overlay starting from 38% */
.cgr{position:absolute;top:36%;left:0;right:0;bottom:0;z-index:2;pointer-events:none}
/* Text info pinned to bottom */
.ci{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:0 20px calc(var(--sab,34px) + 84px) 20px}
.ln{position:absolute;top:65px;right:16px;font-family:var(--f1);font-size:72px;font-weight:800;opacity:.055;line-height:1;color:#fff;z-index:1;letter-spacing:-4px;pointer-events:none}

/* Lesson text — NO letter-spacing compression */
.ltag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;font-family:var(--f2);font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px}
.lttl{font-family:var(--f1);font-size:24px;font-weight:800;line-height:1.15;letter-spacing:-0.3px;margin-bottom:10px;color:var(--tx)}
.lbod{font-family:var(--f2);font-size:14px;line-height:1.6;color:var(--mu2);margin-bottom:14px;font-weight:400}
.lbod strong{color:var(--tx);font-weight:600}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fc{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:9px 11px;backdrop-filter:blur(8px)}
.fl{font-family:var(--f2);font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:2px}
.fv{font-family:var(--f1);font-size:12px;font-weight:700;color:var(--tx)}

/* Swipe cue */
.sc{position:absolute;bottom:calc(var(--sab,34px)+70px);left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;animation:fadeC 4s 2s ease-in-out forwards}
@keyframes fadeC{0%{opacity:0;transform:translateX(-50%) translateY(8px)}25%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
.sa{width:30px;height:30px;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.14);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;animation:bouncA 1.3s ease-in-out infinite}
@keyframes bouncA{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.sl{font-family:var(--f2);font-size:10px;color:var(--mu);letter-spacing:.5px}

/* Quiz cards */
.qci{position:absolute;inset:0;display:flex;flex-direction:column;padding:calc(var(--sat,44px) + 68px) 20px calc(var(--sab,34px) + 84px);overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.qbadge{display:inline-flex;align-items:center;gap:6px;background:var(--cd);border:1px solid rgba(255,107,107,0.3);border-radius:50px;padding:5px 12px;font-family:var(--f2);font-size:11px;font-weight:500;color:var(--co);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;width:fit-content}
.qpbar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:18px;overflow:hidden}
.qpfill{height:100%;background:var(--co);border-radius:2px;transition:width .4s ease}
.qq{font-family:var(--f1);font-size:21px;font-weight:700;line-height:1.28;letter-spacing:-0.2px;color:var(--tx);margin-bottom:20px;flex-shrink:0}
.ol{display:flex;flex-direction:column;gap:9px;flex-shrink:0}
.opt{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);border-radius:15px;padding:13px 15px;cursor:pointer;transition:all .18s ease;text-align:left;width:100%;-webkit-tap-highlight-color:transparent}
.opt:active{transform:scale(0.98)}
.opt:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.16)}
.ok{width:30px;height:30px;flex-shrink:0;border-radius:9px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-family:var(--f1);font-size:12px;font-weight:700;color:var(--mu2);transition:all .2s}
.ot{font-family:var(--f2);font-size:14px;line-height:1.4;color:var(--tx);flex:1}
.opt.cor{background:rgba(45,226,213,0.1);border-color:rgba(45,226,213,0.5)}
.opt.cor .ok{background:var(--tl);border-color:var(--tl);color:#000}
.opt.wrg{background:rgba(255,107,107,0.08);border-color:rgba(255,107,107,0.4)}
.opt.wrg .ok{background:var(--co);border-color:var(--co);color:#fff}
.opt.dim{opacity:.38}
.opt:disabled,.opt[disabled]{cursor:default;pointer-events:none}
.fb{margin-top:13px;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:13px;font-family:var(--f2);font-size:13px;line-height:1.55;color:var(--mu2);opacity:0;transform:translateY(5px);transition:all .3s ease;flex-shrink:0}
.fb.show{opacity:1;transform:translateY(0)}
.cb{margin-top:15px;background:var(--v);border:none;border-radius:15px;padding:15px;color:#fff;font-family:var(--f1);font-size:15px;font-weight:700;cursor:pointer;width:100%;letter-spacing:0;opacity:0;transform:translateY(7px);transition:all .3s .12s ease;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.cb.show{opacity:1;transform:translateY(0)}
.cb:active{transform:scale(0.98)}

/* Final card */
.fin{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px calc(var(--sab,34px)+96px);text-align:center}
.rw{position:relative;width:136px;height:136px;margin-bottom:22px}
.rw svg{position:absolute;inset:0;width:100%;height:100%}
.rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rp{font-family:var(--f1);font-size:34px;font-weight:800;color:var(--tx)}
.rl{font-family:var(--f2);font-size:10px;color:var(--mu);letter-spacing:.5px}
.fg{font-family:var(--f1);font-size:24px;font-weight:800;margin-bottom:7px}
.fm{font-family:var(--f2);font-size:14px;color:var(--mu2);line-height:1.5;margin-bottom:22px;max-width:270px}
.fs{display:flex;gap:10px;margin-bottom:24px;width:100%}
.fst{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:13px 16px;text-align:center;flex:1}
.fsn{font-family:var(--f1);font-size:22px;font-weight:800;margin-bottom:1px}
.fsl{font-family:var(--f2);font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.7px}
.fb2{background:var(--vd);border:1.5px solid rgba(123,104,238,0.4);border-radius:14px;padding:14px;width:100%;color:var(--vl);font-family:var(--f1);font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.fb2:active{transform:scale(0.98)}

/* Bottom nav */
#bn{position:absolute;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:flex-start;justify-content:space-around;padding:11px 10px calc(var(--sab,34px) + 2px);background:rgba(8,8,16,0.88);backdrop-filter:blur(20px);border-top:.5px solid var(--border)}
.nb{display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 18px;border-radius:13px;cursor:pointer;transition:transform .2s;background:none;border:none;-webkit-tap-highlight-color:transparent}
.nb:active{transform:scale(0.88)}
.ni{font-size:21px;line-height:1}
.nl{font-family:var(--f2);font-size:10px;color:var(--mu);letter-spacing:.3px}
.nb.active .nl{color:var(--vl)}
.nb.active .ni{filter:drop-shadow(0 0 7px rgba(123,104,238,0.6))}
.nd{width:4px;height:4px;border-radius:50%;background:var(--v);margin-top:-1px;opacity:0;transition:opacity .2s}
.nb.active .nd{opacity:1}

/* Progress screen */
#ps{position:absolute;inset:0;z-index:500;background:var(--bg);transform:translateY(100%);transition:transform .45s cubic-bezier(0.16,1,0.3,1);overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
#ps.open{transform:translateY(0)}
.psh{position:sticky;top:0;padding:calc(var(--sat,44px)+8px) 20px 13px;background:rgba(8,8,16,0.92);backdrop-filter:blur(16px);border-bottom:.5px solid var(--border);z-index:10;display:flex;align-items:center;gap:11px}
.bkb{width:36px;height:36px;background:var(--s2);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.bkb:active{transform:scale(0.9)}
.pstl{font-family:var(--f1);font-size:20px;font-weight:800;letter-spacing:-.3px}
.psb{padding:18px;padding-bottom:calc(var(--sab,34px)+28px);display:flex;flex-direction:column;gap:18px}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.st2{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:13px 9px;text-align:center}
.sn{font-family:var(--f1);font-size:24px;font-weight:800;margin-bottom:1px}
.sl2{font-family:var(--f2);font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.7px}
.sectit{font-family:var(--f1);font-size:15px;font-weight:700;color:var(--mu2);margin-bottom:9px;letter-spacing:-.1px}
.ltile{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-bottom:7px}
.ltile:last-child{margin-bottom:0}
.ltic{width:38px;height:38px;flex-shrink:0;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.ltin{flex:1;min-width:0}
.ltnm{font-family:var(--f1);font-size:13px;font-weight:700;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx)}
.lttg{font-family:var(--f2);font-size:11px;color:var(--mu)}
.lts{flex-shrink:0;padding:4px 9px;border-radius:7px;font-family:var(--f2);font-size:11px;font-weight:600}
.sd{background:rgba(45,226,213,0.12);color:var(--tl)}
.sn2{background:var(--vd);color:var(--vl)}
.slk{background:rgba(255,255,255,0.04);color:var(--mu)}
.qrt{background:var(--s2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.qrr{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;border-bottom:.5px solid var(--border);font-family:var(--f2);font-size:13px}
.qrr:last-child{border-bottom:none}
.qrm{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.qok{background:rgba(45,226,213,0.2);color:var(--tl)}
.qno{background:rgba(255,107,107,0.2);color:var(--co)}
.qbl{background:rgba(255,255,255,0.05);color:var(--mu)}
.qrq{flex:1;color:var(--mu2);line-height:1.4}
.qrp{font-family:var(--f1);font-size:12px;font-weight:700;color:var(--go);flex-shrink:0;margin-top:1px}

/* Toast */
#toast{position:absolute;top:calc(var(--sat,44px)+58px);left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(20,20,36,0.96);border:1px solid var(--border2);border-radius:18px;padding:8px 16px;font-family:var(--f2);font-size:13px;color:var(--tx);white-space:nowrap;z-index:2000;opacity:0;transition:all .3s ease;pointer-events:none;backdrop-filter:blur(16px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* A2HS banner */
#a2hs{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:rgba(14,14,28,0.97);backdrop-filter:blur(20px);border-top:.5px solid rgba(123,104,238,0.3);padding:14px 18px calc(env(safe-area-inset-bottom,34px)+8px);display:none;align-items:center;gap:13px;animation:slideUp .45s cubic-bezier(0.16,1,0.3,1) both}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
#a2hs-dismiss{background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer;padding:5px;line-height:1;flex-shrink:0}

*{scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="shell">
<div id="app">

  <div id="sb">

// ====== STATE ======
var cur=0, qaArr=new Array(QUIZ.length).fill(null), xp=0, animating=false;
var total=LESSONS.length+QUIZ.length+1;

// ====== INIT ======
function init(){
  tickClock(); setInterval(tickClock,15000);
  buildDots(); buildCards();
  bindGestures();
}

function tickClock(){
  var n=new Date(),h=n.getHours(),m=n.getMinutes();
  document.getElementById('clk').textContent=h+':'+(m<10?'0'+m:m);
}

function buildDots(){
  var row=document.getElementById('dr');
  row.innerHTML='';
  for(var i=0;i<total;i++){
    var d=document.createElement('div');
    var isQ=i>=LESSONS.length&&i<total-1,isFin=i===total-1;
    d.className='pd'+(isQ||isFin?' qt':'')+(i===0?' active':'');
    row.appendChild(d);
  }
}

function buildCards(){
  var feed=document.getElementById('feed');
  feed.innerHTML='';
  LESSONS.forEach(function(l,i){
    var el=document.createElement('div');
    el.className='card'+(i===0?' active':'');
    el.id='c'+i;
    el.innerHTML=lessonHTML(l,i);
    feed.appendChild(el);
  });
  QUIZ.forEach(function(q,i){
    var idx=LESSONS.length+i;
    var el=document.createElement('div');
    el.className='card';
    el.id='c'+idx;
    el.innerHTML=quizHTML(q,i,idx);
    feed.appendChild(el);
  });
  var fin=document.createElement('div');
  fin.className='card'; fin.id='c'+(total-1);
  fin.innerHTML=finalHTML();
  feed.appendChild(fin);
}

function lessonHTML(l,i){
  var facts=l.facts.map(function(f){return '<div class="fc"><div class="fl">'+f.l+'</div><div class="fv">'+f.v+'</div></div>';}).join('');
  return '<div class="cbg" style="background:'+l.bg+'"></div>'
    +'<div class="cart">'+l.art+'</div>'
    +'<div class="cgr" style="background:'+l.gr+'"></div>'
    +'<div class="ln">'+String(i+1).padStart(2,'0')+'</div>'
    +'<div class="ci">'
      +'<div class="ltag" style="background:'+l.ad+';border:1px solid '+l.ac+'55;color:'+l.ac+'">'+l.em+' '+l.tag+'</div>'
      +'<div class="lttl">'+l.title+'</div>'
      +'<div class="lbod">'+l.body+'</div>'
      +'<div class="fr">'+facts+'</div>'
    +'</div>'
    +(i===0?'<div class="sc"><div class="sa">↑</div><div class="sl">SWIPE UP</div></div>':'');
}

function quizHTML(q,qi,ci){
  var L=['A','B','C','D'];
  var pct=Math.round(qi/QUIZ.length*100);
  var opts=q.opts.map(function(o,i){
    return '<button class="opt" id="o'+ci+'_'+i+'" onclick="pickAnswer('+ci+','+qi+','+i+')">'
      +'<span class="ok">'+L[i]+'</span><span class="ot">'+o+'</span></button>';
  }).join('');
  return '<div class="cbg" style="background:radial-gradient(ellipse at 40% 20%,rgba(255,107,107,0.15) 0%,transparent 55%),#0c0812"></div>'
    +'<div class="qci">'
      +'<div class="qbadge">🧪 Question '+(qi+1)+' of '+QUIZ.length+'</div>'
      +'<div class="qpbar"><div class="qpfill" style="width:'+pct+'%"></div></div>'
      +'<div class="qq">'+q.q+'</div>'
      +'<div class="ol">'+opts+'</div>'
      +'<div class="fb" id="fb'+ci+'">'+q.exp+'</div>'
      +'<button class="cb" id="cb'+ci+'" onclick="goNext()">'+(qi<QUIZ.length-1?'Next Question →':'See My Results →')+'</button>'
    +'</div>';
}

function finalHTML(){
  return '<div class="cbg" style="background:radial-gradient(ellipse at 50%30%,rgba(123,104,238,0.2) 0%,transparent 60%),#080810"></div>'
    +'<div class="fin">'
      +'<div class="rw"><svg viewBox="0 0 136 136" xmlns="http://www.w3.org/2000/svg"><circle class="ring-track" cx="68" cy="68" r="55" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="9"/><circle id="rf" cx="68" cy="68" r="55" fill="none" stroke="#7b68ee" stroke-width="9" stroke-linecap="round" stroke-dasharray="345.4" stroke-dashoffset="345.4" transform="rotate(-90 68 68)"/></svg>'
        +'<div class="rc"><div class="rp" id="fpct">—</div><div class="rl">SCORE</div></div>'
      +'</div>'
      +'<div class="fg" id="fgr"></div>'
      +'<div class="fm" id="fmsg"></div>'
      +'<div class="fs"><div class="fst"><div class="fsn" id="fcor" style="color:#2de2d5">—</div><div class="fsl">Correct</div></div>'
        +'<div class="fst"><div class="fsn" id="fxp" style="color:#ffc93c">—</div><div class="fsl">XP</div></div>'
        +'<div class="fst"><div class="fsn" id="fles" style="color:#a78bfa">'+LESSONS.length+'</div><div class="fsl">Lessons</div></div>'
      +'</div>'
      +'<button class="fb2" onclick="openProgress()">📊 View Full Progress</button>'
    +'</div>';
}

// ====== NAVIGATION ======
function goNext(){ goTo(cur+1); }

function goTo(idx){
  if(idx<0||idx>=total||animating||idx===cur) return;
  animating=true;
  var from=document.getElementById('c'+cur);
  var to=document.getElementById('c'+idx);
  if(!from||!to){animating=false;return;}
  from.classList.add('exit-up');
  from.classList.remove('active');
  to.classList.add('active');
  cur=idx;
  if(cur===total-1) computeFinal();
  updateDots(); updateXP();
  setTimeout(function(){from.classList.remove('exit-up');animating=false;},520);
}

function updateDots(){
  document.querySelectorAll('.pd').forEach(function(d,i){
    d.classList.remove('active','seen');
    if(i<cur) d.classList.add('seen');
    if(i===cur) d.classList.add('active');
  });
}
function updateXP(){ document.getElementById('xt').textContent=xp+' XP'; }

// ====== QUIZ ======
function pickAnswer(ci,qi,oi){
  if(qaArr[qi]!==null) return;
  var q=QUIZ[qi];
  var correct=oi===q.ans;
  qaArr[qi]={chosen:oi,correct:correct};
  if(correct){xp+=100;toast('✅ Correct! +100 XP');}
  else{toast('❌ Not quite — see explanation below');}
  for(var i=0;i<q.opts.length;i++){
    var btn=document.getElementById('o'+ci+'_'+i);
    if(!btn) continue;
    btn.setAttribute('disabled','true');
    if(i===q.ans) btn.classList.add('cor');
    else if(i===oi&&!correct) btn.classList.add('wrg');
    else btn.classList.add('dim');
  }
  var fb=document.getElementById('fb'+ci);
  if(fb) fb.classList.add('show');
  var cb=document.getElementById('cb'+ci);
  if(cb) cb.classList.add('show');
  updateXP();
}

function computeFinal(){
  var correct=qaArr.filter(function(a){return a&&a.correct;}).length;
  var total2=QUIZ.length;
  var pct=Math.round(correct/total2*100);
  document.getElementById('fpct').textContent=pct+'%';
  document.getElementById('fcor').textContent=correct+'/'+total2;
  document.getElementById('fxp').textContent=xp;
  var gr='',msg='',col='#7b68ee';
  if(pct===100){gr='Perfect Score! 🏆';msg="Flawless! You've mastered high school chemistry.";col='#ffc93c';}
  else if(pct>=80){gr='Excellent! ⚗️';msg='Outstanding work! Strong chemistry foundation.';col='#2de2d5';}
  else if(pct>=60){gr='Good Job! 📚';msg='Solid understanding. Review a few topics to level up!';col='#a78bfa';}
  else{gr='Keep Studying! 💪';msg='Chemistry takes practice. Review and try again!';col='#ff6b6b';}
  document.getElementById('fgr').textContent=gr;
  document.getElementById('fmsg').textContent=msg;
  var ring=document.getElementById('rf');
  if(ring){
    ring.setAttribute('stroke',col);
    setTimeout(function(){ring.style.transition='stroke-dashoffset 1.5s cubic-bezier(0.34,1.2,0.64,1)';ring.setAttribute('stroke-dashoffset',345.4*(1-pct/100));},150);
  }
}

// ====== BOTTOM NAV ======
function navTo(tab){
  setActive(tab==='home'?'n-home':tab==='quiz'?'n-quiz':'n-prog');
  if(tab==='home'&&cur>=LESSONS.length) goTo(0);
  if(tab==='quiz'&&cur<LESSONS.length) goTo(LESSONS.length);
  if(tab==='prog') openProgress();
}
function setActive(id){
  ['n-home','n-quiz','n-prog'].forEach(function(n){var el=document.getElementById(n);if(el)el.classList.remove('active');});
  var el=document.getElementById(id);if(el)el.classList.add('active');
}

// ====== PROGRESS ======
function openProgress(){
  var ps=document.getElementById('ps');
  var correct=qaArr.filter(function(a){return a&&a.correct;}).length;
  var done=qaArr.filter(Boolean).length;
  var ldone=Math.min(cur,LESSONS.length);
  var icons=['⚛️','🧲','🔭','🔗','📐','💧','⚗️','⚖️','🔢','🧫','🔥','⏱️','⚖️','💨','🌊','⚡','☢️','🌿','🧬','🤝','🧊','🔄','🌀','🌧️','🧪','🌍','🧬'];
  ps.innerHTML='<div class="psh"><button class="bkb" onclick="closeProgress()">←</button><div class="pstl">My Progress</div></div>'
    +'<div class="psb">'
      +'<div class="sg">'
        +'<div class="st2"><div class="sn" style="color:#2de2d5">'+ldone+'</div><div class="sl2">Lessons</div></div>'
        +'<div class="st2"><div class="sn" style="color:#ffc93c">'+xp+'</div><div class="sl2">XP</div></div>'
        +'<div class="st2"><div class="sn" style="color:#ff6b6b">'+(done>0?Math.round(correct/done*100):0)+'%</div><div class="sl2">Quiz</div></div>'
      +'</div>'
      +'<div><div class="sectit">📖 Lesson Map</div><div>'
        +LESSONS.map(function(l,i){
          var done2=i<cur,act=i===cur;
          var sc=done2?'sd':act?'sn2':'slk',st=done2?'Done ✓':act?'Now':'Locked';
          return '<div class="ltile">'
            +'<div class="ltic" style="background:'+l.ad+'">'+(icons[i]||'📚')+'</div>'
            +'<div class="ltin"><div class="ltnm">'+l.title.split(':')[0]+'</div><div class="lttg">'+l.tag+'</div></div>'
            +'<span class="lts '+sc+'">'+st+'</span></div>';
        }).join('')
      +'</div></div>'
      +(qaArr.some(Boolean)?'<div><div class="sectit">🧪 Quiz Results</div><div class="qrt">'
        +QUIZ.map(function(q,i){
          var a=qaArr[i];
          var cls=a?(a.correct?'qok':'qno'):'qbl';
          var mk=a?(a.correct?'✓':'✗'):'–';
          var pts=a?(a.correct?'+100':'0'):'';
          return '<div class="qrr"><div class="qrm '+cls+'">'+mk+'</div><div class="qrq">Q'+(i+1)+': '+q.q.substring(0,50)+(q.q.length>50?'…':'')+'</div>'+(pts?'<div class="qrp">'+pts+'</div>':'')+'</div>';
        }).join('')
      +'</div></div>':'<div style="text-align:center;padding:18px;color:var(--mu);font-family:var(--f2);font-size:13px">Swipe through lessons to unlock the quiz!</div>')
    +'</div>';
  ps.classList.add('open');
  setActive('n-prog');
}
function closeProgress(){
  document.getElementById('ps').classList.remove('open');
  setActive(cur>=LESSONS.length?'n-quiz':'n-home');
}

// ====== GESTURES — no overlay blocking quiz ======
function bindGestures(){
  var feed=document.getElementById('feed');
  var sy=0,st2=0,dragging=false;

  feed.addEventListener('touchstart',function(e){
    // If on a quiz card, let it scroll naturally — only hijack on lesson/final
    var isQCard=cur>=LESSONS.length&&cur<total-1;
    if(isQCard) return; // let quiz scroll
    sy=e.touches[0].clientY; st2=Date.now(); dragging=true;
  },{passive:true});

  feed.addEventListener('touchmove',function(e){
    var isQCard=cur>=LESSONS.length&&cur<total-1;
    if(isQCard) return;
    if(dragging) e.preventDefault();
  },{passive:false});

  feed.addEventListener('touchend',function(e){
    if(!dragging) return; dragging=false;
    var isQCard=cur>=LESSONS.length&&cur<total-1;
    if(isQCard) return;
    var dy=sy-e.changedTouches[0].clientY, dt=Date.now()-st2;
    if(dy>55||(dy>30&&dt<350)) goNext();
    else if(dy<-55||(dy<-30&&dt<350)) {if(cur>0) goTo(cur-1);}
  },{passive:true});

  // Wheel
  var wlock=false;
  document.addEventListener('wheel',function(e){
    var isQCard=cur>=LESSONS.length&&cur<total-1;
    if(isQCard) return;
    if(wlock) return;
    if(e.deltaY>35){goNext();wlock=true;setTimeout(function(){wlock=false;},600);}
    else if(e.deltaY<-35&&cur>0){goTo(cur-1);wlock=true;setTimeout(function(){wlock=false;},600);}
  },{passive:true});

  // Keyboard
  document.addEventListener('keydown',function(e){
    var isQCard=cur>=LESSONS.length&&cur<total-1;
    if(isQCard) return;
    if(e.key==='ArrowUp'||e.key===' '||e.key==='ArrowRight'){e.preventDefault();goNext();}
    if((e.key==='ArrowDown'||e.key==='ArrowLeft')&&cur>0){e.preventDefault();goTo(cur-1);}
  });
}

// ====== TOAST ======
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

// ====== A2HS ======
function dismissA2HS(){
  var b=document.getElementById('a2hs');
  if(!b) return;
  b.style.transition='transform .3s ease,opacity .3s ease';
  b.style.transform='translateY(110%)'; b.style.opacity='0';
  setTimeout(function(){b.style.display='none';},320);
  sessionStorage.setItem('a2hs','1');
}

// ====== SERVICE WORKER ======
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    var swCode='const C="cs-v1";self.addEventListener("install",e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(["./"]).catch(()=>{})));self.skipWaiting();});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{var cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res;}).catch(()=>r)));});';
    var bl=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(bl),{scope:'./'}).catch(function(){});
  });
}

init();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyGram">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070f">
<title>StudyGram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
window.addEventListener('DOMContentLoaded',function(){
  function mkIcon(sz){
    var c=document.createElement('canvas');c.width=c.height=sz;
    var x=c.getContext('2d');
    x.fillStyle='#07070f';x.beginPath();x.roundRect(0,0,sz,sz,sz*.22);x.fill();
    var g=x.createRadialGradient(sz*.38,sz*.34,0,sz*.5,sz*.5,sz*.52);
    g.addColorStop(0,'#818cf8');g.addColorStop(1,'#4338ca');
    x.fillStyle=g;x.beginPath();x.arc(sz*.5,sz*.44,sz*.3,0,Math.PI*2);x.fill();
    x.fillStyle='rgba(255,255,255,.93)';
    x.font='bold '+(sz*.15)+'px sans-serif';x.textAlign='center';x.fillText('SG',sz*.5,sz*.53);
    x.font=(sz*.065)+'px sans-serif';x.fillStyle='rgba(255,255,255,.6)';x.fillText('StudyGram',sz*.5,sz*.83);
    return c.toDataURL('image/png');
  }
  var ic=mkIcon(192);
  ['apple-touch-icon','icon'].forEach(function(r){var l=document.createElement('link');l.rel=r;l.href=ic;document.head.appendChild(l);});
  var mf={name:'StudyGram',short_name:'StudyGram',start_url:'./',display:'standalone',orientation:'portrait',background_color:'#07070f',theme_color:'#07070f',icons:[{src:ic,sizes:'192x192',type:'image/png',purpose:'any maskable'}]};
  var ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/manifest+json'}));document.head.appendChild(ml);
  if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!navigator.standalone&&!sessionStorage.getItem('a2hs')){
    setTimeout(function(){var b=document.getElementById('a2hs');if(b)b.style.display='flex';},8000);
  }
});
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:#000;-webkit-font-smoothing:antialiased}
:root{
  --bg:#07070f;--s2:#151526;--s3:#1c1c32;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --tx:#f0eeff;--mu:rgba(240,238,255,.42);--mu2:rgba(240,238,255,.68);
  --sat:env(safe-area-inset-top,44px);--sab:env(safe-area-inset-bottom,34px);
  --f1:'Plus Jakarta Sans',sans-serif;--f2:'DM Sans',sans-serif;
}
body{display:flex;align-items:center;justify-content:center}
#shell{position:relative;width:100%;max-width:430px;height:100vh;max-height:932px;overflow:hidden;background:var(--bg)}
@media(min-width:500px)and(min-height:780px){
  body{background:#030306}
  #shell{width:390px;height:844px;border-radius:52px;
    box-shadow:0 0 0 1px rgba(255,255,255,.1),0 0 0 10px #161620,0 0 0 11px rgba(255,255,255,.05),0 50px 100px rgba(0,0,0,.9),0 0 120px rgba(99,102,241,.1)}
  #shell::before{content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:116px;height:33px;background:#000;border-radius:18px;z-index:9999}
  body::before{content:'';position:fixed;left:calc(50% - 199px);top:calc(50% - 422px + 155px);width:3px;height:30px;background:#1c1c1c;border-radius:2px 0 0 2px;box-shadow:0 44px 0 #1c1c1c,0 82px 0 #1c1c1c}
  body::after{content:'';position:fixed;right:calc(50% - 199px);top:calc(50% - 422px + 195px);width:3px;height:60px;background:#1c1c1c;border-radius:0 2px 2px 0}
}
#app{width:100%;height:100%;position:relative;overflow:hidden}
/* STATUS BAR */
#sb{position:absolute;top:0;left:0;right:0;height:54px;z-index:1000;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;pointer-events:none}
@media(min-width:500px){#sb{height:60px;padding-top:14px}}
.stime{font-family:var(--f1);font-size:15px;font-weight:700;color:var(--tx)}
.sicons{display:flex;gap:6px;align-items:center}.sicons svg{fill:var(--tx)}
/* SCREENS */
.screen{position:absolute;inset:0;overflow:hidden;transition:transform .44s cubic-bezier(.16,1,.3,1),opacity .44s ease}
.screen.off-r{transform:translateX(110%);opacity:0;pointer-events:none}
.screen.off-d{transform:translateY(110%);opacity:0;pointer-events:none}
/* HOME */
#home{background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.h-head{padding:calc(var(--sat) + 14px) 22px 18px;flex-shrink:0;text-align:center}
.h-logo{font-family:var(--f1);font-size:32px;font-weight:800;letter-spacing:-.6px;margin-bottom:3px}
.h-logo span{background:linear-gradient(130deg,#818cf8,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.h-sub{font-family:var(--f2);font-size:14px;color:var(--mu2)}
.srch{flex-shrink:0;margin:0 20px 18px;display:flex;align-items:center;gap:9px;background:var(--s2);border:1px solid var(--bd2);border-radius:14px;padding:10px 14px}
.srch input{background:none;border:none;outline:none;font-family:var(--f2);font-size:14px;color:var(--tx);flex:1}
.srch input::placeholder{color:var(--mu)}
/* Overall progress strip */
.ov-strip{flex-shrink:0;margin:0 20px 20px;background:var(--s2);border:1px solid var(--bd);border-radius:18px;padding:14px 16px}
.ov-lbl{font-family:var(--f1);font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.ov-bars{display:flex;gap:10px;align-items:flex-end;height:48px}
.ov-bc{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.ov-b{width:100%;min-height:4px;border-radius:4px;background:var(--s3);transition:height .6s ease}
.ov-em{font-size:16px;line-height:1}
.ov-nm{font-family:var(--f2);font-size:10px;color:var(--mu);text-align:center;margin-top:2px}
/* Subject grid */
.sec-lbl{flex-shrink:0;font-family:var(--f1);font-size:14px;font-weight:700;color:var(--mu2);padding:0 20px;margin-bottom:12px}
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:0 20px;padding-bottom:calc(var(--sab) + 24px);flex-shrink:0}
.sc{border-radius:22px;padding:18px 16px 16px;cursor:pointer;transition:transform .18s ease;position:relative;overflow:hidden;min-height:138px;display:flex;flex-direction:column;justify-content:space-between}
.sc:active{transform:scale(.95)}
.sc-glow{position:absolute;top:-24px;right:-24px;width:90px;height:90px;border-radius:50%;opacity:.28;filter:blur(22px);pointer-events:none}
.sc-em{font-size:30px;line-height:1;margin-bottom:8px;position:relative;z-index:1}
.sc-name{font-family:var(--f1);font-size:16px;font-weight:800;color:#fff;position:relative;z-index:1;line-height:1.2}
.sc-meta{font-family:var(--f2);font-size:11px;color:rgba(255,255,255,.65);position:relative;z-index:1;margin-top:4px}
.sc-pbar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 0 22px;opacity:.6;transition:width .5s}
.sc-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.4);border-radius:20px;padding:3px 8px;font-family:var(--f2);font-size:10px;font-weight:600;color:rgba(255,255,255,.9);z-index:2}
/* LESSON SCREEN */
#lesson{background:var(--bg)}
.lbar{position:absolute;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sat) + 4px) 16px 10px;background:linear-gradient(to bottom,rgba(7,7,15,.97) 0%,transparent 100%)}
.bk{width:34px;height:34px;background:rgba(255,255,255,.08);border:1px solid var(--bd2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.bk:active{transform:scale(.88)}
.lbar-c{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 10px}
.lbar-nm{font-family:var(--f1);font-size:13px;font-weight:700;letter-spacing:-.1px}
#dots{display:flex;gap:3px;align-items:center;max-width:220px;overflow:hidden}
.pd{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.16);transition:all .3s cubic-bezier(.34,1.56,.64,1);flex-shrink:0}
.pd.seen{opacity:.65}.pd.active{width:13px;border-radius:3px;opacity:1}.pd.qt{background:rgba(255,107,107,.25)}
#xp-chip{display:flex;align-items:center;gap:5px;background:rgba(255,201,60,.1);border:1px solid rgba(255,201,60,.25);border-radius:20px;padding:5px 10px;cursor:pointer}
#xp-chip:active{transform:scale(.92)}
#xp-txt{font-family:var(--f1);font-size:13px;font-weight:700;color:#ffc93c}
#feed{position:absolute;inset:0;overflow:hidden;touch-action:none}
.card{position:absolute;inset:0;overflow:hidden;transform:translateY(100%);transition:transform .48s cubic-bezier(.16,1,.3,1);will-change:transform;touch-action:none}
.card.active{transform:translateY(0)}.card.exit-up{transform:translateY(-100%)}
.cbg{position:absolute;inset:0;z-index:0}
.cart{position:absolute;top:0;left:0;right:0;height:51%;z-index:1;display:flex;align-items:center;justify-content:center;padding:92px 16px 0}
.cart svg{width:100%;height:100%;max-height:212px}
.cgr{position:absolute;top:33%;left:0;right:0;bottom:0;z-index:2;pointer-events:none}
.ci{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:0 20px calc(var(--sab) + 82px) 20px}
.l-num{position:absolute;top:60px;right:14px;font-family:var(--f1);font-size:68px;font-weight:800;opacity:.055;line-height:1;color:#fff;z-index:1;pointer-events:none}
.l-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:50px;font-family:var(--f2);font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:9px}
.l-title{font-family:var(--f1);font-size:22px;font-weight:800;line-height:1.15;letter-spacing:-.3px;margin-bottom:9px;color:var(--tx)}
.l-body{font-family:var(--f2);font-size:13.5px;line-height:1.62;color:var(--mu2);margin-bottom:13px}
.l-body strong{color:var(--tx);font-weight:600}
.facts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fact{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 11px;backdrop-filter:blur(8px)}
.f-lbl{font-family:var(--f2);font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.f-val{font-family:var(--f1);font-size:12px;font-weight:700;color:var(--tx)}
.swipe-cue{position:absolute;bottom:calc(var(--sab) + 70px);left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;animation:fhint 4s 2.5s ease forwards}
@keyframes fhint{0%{opacity:0;transform:translateX(-50%) translateY(8px)}25%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
.sa{width:30px;height:30px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;animation:bncA 1.4s ease-in-out infinite}
@keyframes bncA{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.sl{font-family:var(--f2);font-size:10px;color:var(--mu);letter-spacing:.5px}
/* TAP NEXT button — always visible on lesson cards */
.tap-next{position:absolute;bottom:calc(var(--sab) + 86px);right:18px;z-index:10;width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;backdrop-filter:blur(8px);transition:transform .15s,background .15s}
.tap-next:active{transform:scale(.88);background:rgba(255,255,255,.2)}
.qi{position:absolute;inset:0;display:flex;flex-direction:column;padding:calc(var(--sat) + 66px) 20px calc(var(--sab) + 82px);overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.qbadge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,107,.14);border:1px solid rgba(255,107,107,.3);border-radius:50px;padding:4px 12px;font-family:var(--f2);font-size:10px;font-weight:500;color:#ff6b6b;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;width:fit-content}
.qpbar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:16px;overflow:hidden}
.qpf{height:100%;background:#ff6b6b;border-radius:2px;transition:width .4s ease}
.qtext{font-family:var(--f1);font-size:19px;font-weight:700;line-height:1.28;letter-spacing:-.2px;color:var(--tx);margin-bottom:18px;flex-shrink:0}
.opts{display:flex;flex-direction:column;gap:9px;flex-shrink:0}
.opt{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.09);border-radius:14px;padding:13px 14px;cursor:pointer;transition:background .15s,border-color .15s,transform .1s;text-align:left;width:100%;touch-action:manipulation}
.opt:active{transform:scale(.98)}
.opt:hover:not([disabled]){background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18)}
.ok{width:28px;height:28px;flex-shrink:0;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:var(--f1);font-size:12px;font-weight:700;color:var(--mu2);transition:all .2s}
.ot{font-family:var(--f2);font-size:14px;line-height:1.4;color:var(--tx);flex:1}
.opt.cor{background:rgba(45,226,213,.1);border-color:rgba(45,226,213,.5)}.opt.cor .ok{background:#2de2d5;border-color:#2de2d5;color:#000}
.opt.wrg{background:rgba(255,107,107,.09);border-color:rgba(255,107,107,.4)}.opt.wrg .ok{background:#ff6b6b;border-color:#ff6b6b;color:#fff}
.opt.dim{opacity:.34}
.qexp{margin-top:12px;padding:11px 13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-family:var(--f2);font-size:13px;line-height:1.55;color:var(--mu2);opacity:0;transform:translateY(5px);transition:all .3s ease;flex-shrink:0}
.qexp.show{opacity:1;transform:translateY(0)}
.qnext{margin-top:14px;background:#6366f1;border:none;border-radius:14px;padding:14px;color:#fff;font-family:var(--f1);font-size:15px;font-weight:700;cursor:pointer;width:100%;opacity:0;transform:translateY(7px);transition:all .3s .1s ease;flex-shrink:0;touch-action:manipulation}
.qnext.show{opacity:1;transform:translateY(0)}.qnext:active{transform:scale(.98)}
/* FINAL */
.fin{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px calc(var(--sab) + 92px);text-align:center}
.rw{position:relative;width:130px;height:130px;margin-bottom:20px}
.rw svg{position:absolute;inset:0;width:100%;height:100%}
.rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rpct{font-family:var(--f1);font-size:32px;font-weight:800;color:var(--tx)}
.rlbl{font-family:var(--f2);font-size:10px;color:var(--mu);letter-spacing:.5px}
.fgr{font-family:var(--f1);font-size:22px;font-weight:800;margin-bottom:6px}
.fms{font-family:var(--f2);font-size:13px;color:var(--mu2);line-height:1.5;margin-bottom:20px;max-width:270px}
.fsts{display:flex;gap:10px;margin-bottom:20px;width:100%}
.fst{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;text-align:center;flex:1}
.fsn{font-family:var(--f1);font-size:20px;font-weight:800;margin-bottom:1px}
.fsl{font-family:var(--f2);font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.7px}
.fbtns{display:flex;flex-direction:column;gap:9px;width:100%}
.fbtn{border:none;border-radius:13px;padding:13px;font-family:var(--f1);font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation}
.fbtn:active{transform:scale(.97)}
.fp{background:#6366f1;color:#fff}.fs2{background:rgba(255,255,255,.06);border:1px solid var(--bd2)!important;color:var(--mu2)}
/* BOTTOM NAV */
#bnav{position:absolute;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:flex-start;justify-content:space-around;padding:10px 10px calc(var(--sab) + 2px);background:rgba(7,7,15,.9);backdrop-filter:blur(20px);border-top:.5px solid var(--bd)}
.nb{display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 20px;border-radius:12px;cursor:pointer;background:none;border:none;touch-action:manipulation}
.nb:active{transform:scale(.88)}
.ni{font-size:21px;line-height:1}.nl{font-family:var(--f2);font-size:10px;color:var(--mu)}
.nb.on .nl{color:#818cf8}.nb.on .ni{filter:drop-shadow(0 0 7px rgba(99,102,241,.65))}
.nd{width:4px;height:4px;border-radius:50%;background:#6366f1;margin-top:-1px;opacity:0}
.nb.on .nd{opacity:1}
/* PROGRESS SCREEN */
#prog{background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.phdr{position:sticky;top:0;flex-shrink:0;padding:calc(var(--sat) + 6px) 20px 12px;background:rgba(7,7,15,.94);backdrop-filter:blur(16px);border-bottom:.5px solid var(--bd);z-index:10;display:flex;align-items:center;gap:11px}
.pbk{width:34px;height:34px;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0}
.pbk:active{transform:scale(.9)}
.ptitle{font-family:var(--f1);font-size:19px;font-weight:800;letter-spacing:-.3px}
.pbody{padding:18px 20px;padding-bottom:calc(var(--sab) + 30px);display:flex;flex-direction:column;gap:18px}
.pgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.ptile{background:var(--s2);border:1px solid var(--bd);border-radius:15px;padding:12px 8px;text-align:center}
.ptn{font-family:var(--f1);font-size:22px;font-weight:800;margin-bottom:1px}
.ptl{font-family:var(--f2);font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.7px}
.sectit{font-family:var(--f1);font-size:14px;font-weight:700;color:var(--mu2)}
.sp-row{background:var(--s2);border:1px solid var(--bd);border-radius:17px;padding:14px 15px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.sp-row:active{background:var(--s3)}.sp-row:last-child{margin-bottom:0}
.sp-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sp-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sp-nm{font-family:var(--f1);font-size:14px;font-weight:700;color:var(--tx);flex:1}
.sp-xp{font-family:var(--f1);font-size:12px;font-weight:700;color:#ffc93c}
.sp-bg{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.sp-fill{height:100%;border-radius:3px;transition:width .5s}
.sp-foot{display:flex;justify-content:space-between;margin-top:4px}
.sp-ft{font-family:var(--f2);font-size:10px;color:var(--mu)}
.qr-tile{background:var(--s2);border:1px solid var(--bd);border-radius:15px;overflow:hidden}
.qr-row{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-bottom:.5px solid var(--bd)}
.qr-row:last-child{border-bottom:none}
.qrm{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.ok2{background:rgba(45,226,213,.2);color:#2de2d5}.no2{background:rgba(255,107,107,.2);color:#ff6b6b}.pnd{background:rgba(255,255,255,.05);color:var(--mu)}
.qrq{flex:1;color:var(--mu2);line-height:1.4;font-family:var(--f2);font-size:12px}
.qrp{font-family:var(--f1);font-size:11px;font-weight:700;color:#ffc93c;flex-shrink:0;margin-top:1px}
#toast{position:absolute;top:calc(var(--sat) + 56px);left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(18,18,32,.96);border:1px solid var(--bd2);border-radius:18px;padding:8px 16px;font-family:var(--f2);font-size:13px;color:var(--tx);white-space:nowrap;z-index:3000;opacity:0;transition:all .3s ease;pointer-events:none;backdrop-filter:blur(16px)}

idth=".7"/><text x="150" y="163" text-anchor="middle" fill="rgba(129,140,248,.82)" font-size="9" font-family="DM Sans" font-weight="500">Each pH step = 10× stronger | Acid+Base→Salt+Water</text></svg>'},

  {tag:'Stoichiometry',em:'⚖️',title:"Stoichiometry: Mole Ratios",

="130" text-anchor="middle" fill="rgba(240,238,255,.55)" font-size="9" font-family="DM Sans">Add reactant → shifts right (more product)</text><text x="150" y="146" text-anchor="middle" fill="rgba(240,238,255,.55)" font-size="9" font-family="DM Sans">Increase pressure → favors fewer moles of gas</text><text x="150" y="160" text-anchor="middle" fill="rgba(240,238,255,.5)" font-size="9" font-family="DM Sans">Increase temp → shifts toward endothermic side</text></svg>'},

  {tag:'Functions & Domain',em:'📈',title:"Functions: One Input, One Output",

" font-family="DM Sans">a₆ = 96</text><text x="224" y="138" text-anchor="middle" fill="rgba(52,211,153,.7)" font-size="8.5" font-family="DM Sans">Converges if |r| &lt; 1</text></svg>'},

   art:'<svg viewBox="0 0 300 185" xmlns="http://www.w3.org/2000/svg"><text x="150" y="16" text-anchor="middle" fill="rgba(240,238,255,.55)" font-size="9" font-family="DM Sans">Pascal\'s Triangle (binomial coefficients)</text>'+function(){var rows=[[1],[1,1],[1,2,1],[1,3,3,1],[1,4,6,4,1],[1,5,10,10,5,1]];var s='';var cols=['#f87171','#fbbf24','#34d399','#38bdf8','#818cf8','#a78bfa'];rows.forEach(function(row,ri){var startX=(300-row.length*32)/2+16;row.forEach(function(val,ci){var x=startX+ci*32,y=26+ri*25;s+='<circle cx="'+x+'" cy="'+y+'" r="12" fill="'+cols[ri]+'" fill-opacity="'+(0.1+ri*0.03)+'" stroke="'+cols[ri]+'" stroke-opacity=".35" stroke-width=".8"/><text x="'+x+'" y="'+(y+4)+'" text-anchor="middle" fill="'+cols[ri]+'" font-size="'+(val>9?7.5:9)+'" font-family="DM Sans" font-weight="600">'+val+'</text>';});});return s;}()+'<text x="150" y="182" text-anchor="middle" fill="rgba(240,238,255,.45)" font-size="8.5" font-family="DM Sans">C(n,k) = coefficients in (a+b)ⁿ expansion</text></svg>'},

  {tag:'Integrals',em:'∫',title:"Integration: Area Under the Curve",
   body:"The <strong>integral</strong> ∫f(x)dx is the antiderivative + C. The <strong>Fundamental Theorem of Calculus</strong>: ∫[a,b]f(x)dx = F(b)−F(a) where F′=f. Geometrically it's area under the curve.",

  {tag:'Integration Techniques',em:'🔧',title:"U-Substitution & Integration by Parts",

  {tag:'Related Rates',em:'⏱️',title:"Related Rates: How Things Change Together",

  {tag:'Series & Convergence',em:'∑',title:"Infinite Series & Convergence",
   body:"An <strong>infinite series</strong> ∑aₙ may converge to a finite sum or diverge. The <strong>geometric series</strong> ∑arⁿ converges to a/(1−r) when |r| < 1. Tests like the ratio test determine convergence.",
   facts:[{l:'Geometric series',v:'a/(1−r) if |r|<1'},{l:'Divergence test',v:'if aₙ↛0, diverges'},{l:'Ratio test',v:'lim|aₙ₊₁/aₙ|<1'},{l:'p-series',v:'∑1/nᵖ conv if p>1'}],
   art:'<svg viewBox="0 0 300 185" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="8" width="284" height="169" rx="12" fill="rgba(180,83,9,.04)" stroke="rgba(180,83,9,.2)" stroke-width="1"/><text x="150" y="28" text-anchor="middle" fill="rgba(251,191,36,.85)" font-size="11" font-family="DM Sans" font-weight="600">Geometric: ½ + ¼ + ⅛ + ¹⁄₁₆ + …</text><rect x="20" y="40" width="260" height="18" rx="4" fill="rgba(251,191,36,.15)"/><rect x="20" y="40" width="130" height="18" rx="4" fill="rgba(251,191,36,.3)"/><rect x="20" y="40" width="65" height="18" rx="4" fill="rgba(251,191,36,.5)"/><rect x="20" y="40" width="32" height="18" rx="4" fill="rgba(251,191,36,.75)"/><text x="36" y="52" text-anchor="middle" fill="rgba(251,191,36,.9)" font-size="8" font-family="DM Sans">½</text><text x="82" y="52" text-anchor="middle" fill="rgba(251,191,36,.7)" font-size="8" font-family="DM Sans">¼</text><text x="150" y="52" text-anchor="middle" fill="rgba(251,191,36,.5)" font-size="8" font-family="DM Sans">⅛ …</text><text x="150" y="80" text-anchor="middle" fill="rgba(240,238,255,.6)" font-size="8.5" font-family="DM Sans">Each term is half the previous (r=½, |r|&lt;1)</text><text x="150" y="98" text-anchor="middle" fill="rgba(52,211,153,.9)" font-size="12" font-family="DM Sans" font-weight="600">Sum = a/(1−r) = ½/½ = 1</text><text x="150" y="116" text-anchor="middle" fill="rgba(240,238,255,.5)" font-size="8.5" font-family="DM Sans">Infinitely many terms, yet the sum is finite!</text><rect x="16" y="128" width="268" height="42" rx="9" fill="rgba(129,140,248,.07)" stroke="rgba(129,140,248,.2)" stroke-width=".8"/><text x="150" y="146" text-anchor="middle" fill="rgba(129,140,248,.85)" font-size="9.5" font-family="DM Sans" font-weight="500">Ratio Test: L=lim|aₙ₊₁/aₙ|</text><text x="150" y="162" text-anchor="middle" fill="rgba(240,238,255,.55)" font-size="9" font-family="DM Sans">L&lt;1 → converges | L&gt;1 → diverges | L=1 → inconclusive</text></svg>'},

  {tag:'The Nervous System',em:'🧠',title:"Neurons & the Nervous System",

  {tag:'Homeostasis',em:'⚖️',title:"Homeostasis: Maintaining Balance",
   body:"<strong>Homeostasis</strong> keeps internal conditions stable (temperature, pH, blood glucose). <strong>Negative feedback loops</strong>: a change triggers a response that reverses it — like a thermostat.",

  {tag:'Biomes & Biodiversity',em:'🌲',title:"Biomes & Biodiversity",

  {tag:'Protein Synthesis',em:'🔬',title:"Protein Synthesis: Transcription & Translation",

';}).join('')+'</svg>'},
  {tag:'Biotechnology',em:'🧪',title:"Biotechnology: Engineering Life",

  {tag:'Boolean Logic',em:'⚡',title:"Boolean Logic & Truth Tables",

  {tag:'Order of Operations',em:'🔢',title:"PEMDAS: Order of Operations",

  {tag:'Exponents & Radicals',em:'🔋',title:"Exponent Rules",

// ═══════════════ STATE ═══════════════
var ST={cur:null,idx:0,anim:false,qCards:[]};
var sessAns=[];

// ═══════════════ PERSISTENCE ═══════════════
function saveP(id,d){try{localStorage.setItem('sg2_'+id,JSON.stringify(d));}catch(e){}}
function loadP(id){
  try{var d=JSON.parse(localStorage.getItem('sg2_'+id)||'null');return d||{xp:0,seen:0,bestPct:0};}
  catch(e){return{xp:0,seen:0,bestPct:0};}
}

// ═══════════════ CLOCK ═══════════════
function tick(){var n=new Date(),h=n.getHours(),m=n.getMinutes();document.getElementById('clk').textContent=h+':'+(m<10?'0'+m:m);}

// ═══════════════ HOME ═══════════════
function buildHome(){buildOvBars();buildGrid(SUBJECTS);}

function buildOvBars(){
  var el=document.getElementById('ov-bars');
  el.innerHTML='';
  SUBJECTS.forEach(function(s){
    var p=loadP(s.id);
    var tot=s.lessons.length+10+1;
    var pct=Math.min((p.seen||0)/tot,1);
    var h=Math.max(4,Math.round(pct*40));
    el.innerHTML+='<div class="ov-bc">'
      +'<div class="ov-b" style="height:'+h+'px;background:'+s.color+';opacity:'+(0.4+pct*0.6)+'"></div>'
      +'<div class="ov-em">'+s.emoji+'</div>'
      +'<div class="ov-nm">'+s.name.split(' ')[0]+'</div>'
      +'</div>';
  });
}

function buildGrid(list){
  var grid=document.getElementById('subj-grid');
  var lbl=document.getElementById('sec-lbl');
  lbl.textContent=list.length===SUBJECTS.length?'All Subjects':'Results';
  grid.innerHTML='';
  list.forEach(function(s){
    var p=loadP(s.id);
    var tot=s.lessons.length+10+1;
    var pct=Math.round(Math.min((p.seen||0)/tot,1)*100);
    grid.innerHTML+='<div class="sc" style="background:'+s.grad+'" onclick="openSubj(\''+s.id+'\')">'
      +'<div class="sc-glow" style="background:'+s.color+'"></div>'
      +(pct>0?'<div class="sc-badge">'+pct+'%</div>':'')
      +'<div class="sc-em">'+s.emoji+'</div>'
      +'<div><div class="sc-name">'+s.name+'</div>'
      +'<div class="sc-meta">'+s.lessons.length+' lessons · 10 quiz Q</div></div>'
      +'<div class="sc-pbar" style="background:'+s.color+';width:'+pct+'%"></div>'
      +'</div>';
  });
}

function filterSubj(v){
  var fl=v?SUBJECTS.filter(function(s){return s.name.toLowerCase().includes(v.toLowerCase());}):SUBJECTS;
  buildGrid(fl);
}

// ═══════════════ OPEN SUBJECT ═══════════════
function openSubj(id){
  var s=SUBJECTS.find(function(x){return x.id===id;});
  if(!s)return;
  ST.cur=id;ST.idx=0;ST.anim=false;
  sessAns=[];
  ST.qCards=shuffle(s.quiz.map(function(q,i){return{q:q,oi:i};}));
  buildLScreen(s);
  showScr('lesson');
  setNav('learn');
}

function goHome(){showScr('home');buildOvBars();buildGrid(SUBJECTS);}

// ═══════════════ LESSON SCREEN ═══════════════
function buildLScreen(s){
  document.getElementById('lbar-nm').textContent=s.name;
  document.getElementById('lbar-nm').style.color=s.color;
  document.getElementById('bk-btn').onclick=goHome;
  buildDotRow(s);
  var feed=document.getElementById('feed');
  feed.innerHTML='';
  s.lessons.forEach(function(l,i){
    var el=document.createElement('div');
    el.className='card'+(i===0?' active':'');
    el.id='c'+i;
    el.innerHTML=mkLesson(l,i,s);
    feed.appendChild(el);
  });
  ST.qCards.forEach(function(item,qi){
    var idx=s.lessons.length+qi;
    var el=document.createElement('div');
    el.className='card';el.id='c'+idx;
    el.innerHTML=mkQuiz(item.q,qi,idx,ST.qCards.length);
    feed.appendChild(el);
  });
  var fin=document.createElement('div');
  fin.className='card';fin.id='c'+(s.lessons.length+ST.qCards.length);
  fin.innerHTML=mkFinal(s);
  feed.appendChild(fin);
  updateXP();
}

function mkLesson(l,i,s){
  var fc=l.facts.map(function(f){return '<div class="fact"><div class="f-lbl">'+f.l+'</div><div class="f-val">'+f.v+'</div></div>';}).join('');
  var bg0=(s.grad.match(/#[0-9a-f]{6}/gi)||['#07070f'])[0];
  return '<div class="cbg" style="background:'+s.grad.replace('145deg','162deg')+',#07070f"></div>'
    +'<div class="cart">'+l.art+'</div>'
    +'<div class="cgr" style="background:linear-gradient(to top,'+bg0+' 38%,transparent)"></div>'
    +'<div class="l-num">'+String(i+1).padStart(2,'0')+'</div>'
    +'<div class="ci">'
      +'<div class="l-tag" style="background:'+s.color+'22;border:1px solid '+s.color+'55;color:'+s.color+'">'+l.em+' '+l.tag+'</div>'
      +'<div class="l-title">'+l.title+'</div>'
      +'<div class="l-body">'+l.body+'</div>'
      +'<div class="facts">'+fc+'</div>'
    +'</div>'
    +(i===0?'<div class="swipe-cue"><div class="sa">↑</div><div class="sl">SWIPE UP</div></div>':'')
    +'<div class="tap-next" onclick="goNext()" title="Next">↑</div>';
}

function mkQuiz(q,qi,ci,tot){
  var L=['A','B','C','D'];
  var pct=Math.round(qi/tot*100);
  var opts=q.opts.map(function(o,i){
    return '<button class="opt" id="o'+ci+'_'+i+'" onclick="pickAns('+ci+','+qi+','+i+')">'
      +'<span class="ok">'+L[i]+'</span><span class="ot">'+o+'</span></button>';
  }).join('');
  return '<div class="cbg" style="background:radial-gradient(ellipse at 40% 20%,rgba(255,107,107,.16) 0%,transparent 55%),#0c0812"></div>'
    +'<div class="qi">'
      +'<div class="qbadge">🧠 Question '+(qi+1)+' of '+tot+'</div>'
      +'<div class="qpbar"><div class="qpf" style="width:'+pct+'%"></div></div>'
      +'<div class="qtext">'+q.q+'</div>'
      +'<div class="opts">'+opts+'</div>'
      +'<div class="qexp" id="ex'+ci+'">'+q.exp+'</div>'
      +'<button class="qnext" id="nx'+ci+'" onclick="goNext()">'+(qi<tot-1?'Next Question →':'See My Results →')+'</button>'
    +'</div>';
}

function mkFinal(s){
  return '<div class="cbg" style="background:radial-gradient(ellipse at 50% 30%,'+s.color+'33 0%,transparent 60%),#07070f"></div>'
    +'<div class="fin">'
      +'<div class="rw"><svg viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg"><circle cx="65" cy="65" r="54" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="9"/><circle id="rfill" cx="65" cy="65" r="54" fill="none" stroke="'+s.color+'" stroke-width="9" stroke-linecap="round" stroke-dasharray="339.3" stroke-dashoffset="339.3" transform="rotate(-90 65 65)"/></svg>'
        +'<div class="rc"><div class="rpct" id="fpct">—</div><div class="rlbl">SCORE</div></div>'
      +'</div>'
      +'<div class="fgr" id="fgrd"></div>'
      +'<div class="fms" id="fmsg"></div>'
      +'<div class="fsts">'
        +'<div class="fst"><div class="fsn" id="fcor" style="color:#2de2d5">—</div><div class="fsl">Correct</div></div>'
        +'<div class="fst"><div class="fsn" id="fxp2" style="color:#ffc93c">—</div><div class="fsl">XP</div></div>'
        +'<div class="fst"><div class="fsn" style="color:#a78bfa">'+s.lessons.length+'</div><div class="fsl">Lessons</div></div>'
      +'</div>'
      +'<div class="fbtns">'
        +'<button class="fbtn fp" onclick="openProg()">📊 View Progress</button>'
        +'<button class="fbtn fs2" onclick="goHome()">← All Subjects</button>'
      +'</div>'
    +'</div>';
}

// ═══════════════ DOTS ═══════════════
function buildDotRow(s){
  var row=document.getElementById('dots');
  var tot=s.lessons.length+ST.qCards.length+1;
  row.innerHTML='';
  for(var i=0;i<tot;i++){
    var d=document.createElement('div');
    var isQ=i>=s.lessons.length&&i<tot-1;
    d.className='pd'+(isQ?' qt':'')+(i===0?' active':'');
    row.appendChild(d);
  }
}

function updateDots(){
  var s=curS();if(!s)return;
  var tot=s.lessons.length+ST.qCards.length+1;
  document.querySelectorAll('.pd').forEach(function(d,i){
    d.classList.remove('active','seen');
    if(i<ST.idx)d.classList.add('seen');
    if(i===ST.idx)d.classList.add('active');
    if(i<ST.idx&&!d.classList.contains('qt'))d.style.background=s.color;
    if(i===ST.idx&&!d.classList.contains('qt'))d.style.background=s.color;
  });
}

// ═══════════════ NAVIGATION ═══════════════
function goNext(){go(ST.idx+1);}

function go(idx){
  var s=curS();if(!s)return;
  var tot=s.lessons.length+ST.qCards.length+1;
  if(idx<0||idx>=tot||ST.anim||idx===ST.idx)return;
  ST.anim=true;
  var from=document.getElementById('c'+ST.idx);
  var to=document.getElementById('c'+idx);
  if(!from||!to){ST.anim=false;return;}
  from.classList.add('exit-up');from.classList.remove('active');
  to.classList.add('active');
  ST.idx=idx;
  var p=loadP(s.id);
  if(idx>(p.seen||0)){p.seen=idx;saveP(s.id,p);}
  if(ST.idx===tot-1)calcFinal();
  updateDots();updateXP();
  if(ST.idx<s.lessons.length)setNav('learn');
  else if(ST.idx<tot-1)setNav('quiz');
  setTimeout(function(){from.classList.remove('exit-up');ST.anim=false;},520);
}

function navTab(tab){
  var s=curS();if(!s)return;
  setNav(tab);
  if(tab==='learn')go(0);
  else if(tab==='quiz')go(s.lessons.length);
  else openProg();
}

function setNav(tab){
  ['n-learn','n-quiz','n-prog'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('on');});
  var mp={learn:'n-learn',quiz:'n-quiz',prog:'n-prog'};
  var el=document.getElementById(mp[tab]);if(el)el.classList.add('on');
}

// ═══════════════ QUIZ ═══════════════
function pickAns(ci,qi,oi){
  if(sessAns[qi]!=null)return;
  var item=ST.qCards[qi];if(!item)return;
  var q=item.q;
  var ok=oi===q.ans;
  sessAns[qi]={ok:ok,chosen:oi};
  if(ok){
    var s=curS();var p=loadP(s.id);
    p.xp=(p.xp||0)+100;saveP(s.id,p);
    toast('✅ Correct! +100 XP');
  } else {
    toast('❌ Not quite — see explanation!');
  }
  for(var i=0;i<q.opts.length;i++){
    var btn=document.getElementById('o'+ci+'_'+i);
    if(!btn)continue;
    btn.setAttribute('disabled','1');
    if(i===q.ans)btn.classList.add('cor');
    else if(i===oi&&!ok)btn.classList.add('wrg');
    else btn.classList.add('dim');
  }
  var ex=document.getElementById('ex'+ci);if(ex)ex.classList.add('show');
  var nx=document.getElementById('nx'+ci);if(nx)nx.classList.add('show');
  updateXP();
}

function calcFinal(){
  var s=curS();if(!s)return;
  var tot=ST.qCards.length;
  var cor=sessAns.filter(function(a){return a&&a.ok;}).length;
  var pct=tot>0?Math.round(cor/tot*100):0;
  var p=loadP(s.id);if(pct>(p.bestPct||0)){p.bestPct=pct;saveP(s.id,p);}
  document.getElementById('fpct').textContent=pct+'%';
  document.getElementById('fcor').textContent=cor+'/'+tot;
  document.getElementById('fxp2').textContent=p.xp||0;
  var gr='',ms='',col=s.color;
  if(pct===100){gr='Perfect! 🏆';ms="Flawless! You've mastered this topic.";}
  else if(pct>=80){gr='Excellent! ⭐';ms='Great work! Strong understanding.';}
  else if(pct>=60){gr='Good Job! 📚';ms='Solid base. Review a few topics!';}
  else{gr='Keep Studying! 💪';ms='Practice makes perfect. Try again!';}
  document.getElementById('fgrd').textContent=gr;
  document.getElementById('fmsg').textContent=ms;
  var ring=document.getElementById('rfill');
  if(ring){
    ring.setAttribute('stroke',col);
    setTimeout(function(){ring.style.transition='stroke-dashoffset 1.5s cubic-bezier(.34,1.2,.64,1)';ring.setAttribute('stroke-dashoffset',339.3*(1-pct/100));},150);
  }
}

// ═══════════════ PROGRESS ═══════════════
function openProg(){
  var body=document.getElementById('prog-body');
  var totalXP=SUBJECTS.reduce(function(a,s){return a+(loadP(s.id).xp||0);},0);
  var totalSeen=SUBJECTS.reduce(function(a,s){return a+Math.min(loadP(s.id).seen||0,s.lessons.length);},0);
  var best=SUBJECTS.reduce(function(a,s){return Math.max(a,loadP(s.id).bestPct||0);},0);
  body.innerHTML='<div class="pgrid3">'
    +'<div class="ptile"><div class="ptn" style="color:#2de2d5">'+totalSeen+'</div><div class="ptl">Lessons</div></div>'
    +'<div class="ptile"><div class="ptn" style="color:#ffc93c">'+totalXP+'</div><div class="ptl">Total XP</div></div>'
    +'<div class="ptile"><div class="ptn" style="color:#f87171">'+(best||'—')+(best?'%':'')+'</div><div class="ptl">Best Score</div></div>'
    +'</div>'
    +'<div class="sectit">📊 Subject Progress</div>'
    +'<div>'+SUBJECTS.map(function(s){
      var p=loadP(s.id);
      var tot=s.lessons.length+10+1;
      var seen=Math.min(p.seen||0,tot);
      var pct=Math.round(seen/tot*100);
      return '<div class="sp-row" onclick="openSubj(\''+s.id+'\')">'
        +'<div class="sp-top">'
          +'<div class="sp-ic" style="background:'+s.color+'22">'+s.emoji+'</div>'
          +'<div class="sp-nm">'+s.name+'</div>'
          +'<div class="sp-xp">⭐ '+(p.xp||0)+' XP</div>'
        +'</div>'
        +'<div class="sp-bg"><div class="sp-fill" style="width:'+pct+'%;background:'+s.color+'"></div></div>'
        +'<div class="sp-foot">'
          +'<div class="sp-ft">'+seen+' / '+tot+' completed</div>'
          +'<div class="sp-ft">Best quiz: '+(p.bestPct||0)+'%</div>'
        +'</div>'
      +'</div>';
    }).join('')+'</div>'
    +(sessAns.some(Boolean)&&ST.cur?buildQRHTML():'')
    +'<div style="height:10px"></div>';
  showScr('prog');setNav('prog');
}

function buildQRHTML(){
  var s=curS();if(!s)return'';
  var rows=ST.qCards.map(function(item,i){
    var a=sessAns[i];
    var cls=a?(a.ok?'ok2':'no2'):'pnd';
    var mk=a?(a.ok?'✓':'✗'):'–';
    var pts=a&&a.ok?'+100':'';
    return '<div class="qr-row"><div class="qrm '+cls+'">'+mk+'</div>'
      +'<div class="qrq">Q'+(i+1)+': '+item.q.q.substring(0,52)+(item.q.q.length>52?'…':'')+'</div>'
      +(pts?'<div class="qrp">'+pts+'</div>':'')
      +'</div>';
  }).join('');
  return '<div class="sectit">🧠 Quiz Results — '+s.name+'</div>'
    +'<div class="qr-tile">'+rows+'</div>';
}

function closeProg(){
  if(ST.cur){showScr('lesson');setNav(ST.idx<(curS()||{lessons:[]}).lessons.length?'learn':'quiz');}
  else showScr('home');
}

// ═══════════════ SCREEN TRANSITIONS ═══════════════
function showScr(id){
  ['home','lesson','prog'].forEach(function(s){
    var el=document.getElementById(s);if(!el)return;
    el.classList.remove('off-r','off-d');
    if(s!==id){
      if(s==='prog')el.classList.add('off-d');
      else el.classList.add('off-r');
    }
  });
}

// ═══════════════ GESTURES ═══════════════
function bindGestures(){
  var sy=0,sx=0,st=0,drag=false;

  function isQuizCard(){
    var s=curS();
    return s&&ST.idx>=s.lessons.length&&ST.idx<s.lessons.length+ST.qCards.length;
  }

  function lessonActive(){
    return ST.cur!==null && document.getElementById('lesson') &&
      !document.getElementById('lesson').classList.contains('off-r');
  }

  document.addEventListener('touchstart',function(e){
    if(!lessonActive())return;
    if(isQuizCard())return; // quiz cards handle their own scrolling
    sy=e.touches[0].clientY;
    sx=e.touches[0].clientX;
    st=Date.now();
    drag=true;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!drag||!lessonActive()||isQuizCard())return;
    // Prevent page scroll while swiping lesson cards
    var dy=Math.abs(e.touches[0].clientY-sy);
    var dx=Math.abs(e.touches[0].clientX-sx);
    if(dy>dx) e.preventDefault(); // vertical swipe — suppress scroll
  },{passive:false});

  document.addEventListener('touchend',function(e){
    if(!drag)return;
    drag=false;
    if(!lessonActive()||isQuizCard())return;
    var dy=sy-e.changedTouches[0].clientY;
    var dt=Date.now()-st;
    if(dy>50||(dy>25&&dt<300))goNext();
    else if(dy<-50||(dy<-25&&dt<300)){if(ST.idx>0)go(ST.idx-1);}
  },{passive:true});

  // Mouse wheel (desktop)
  var wl=false;
  document.addEventListener('wheel',function(e){
    if(!lessonActive()||isQuizCard()||wl)return;
    if(e.deltaY>30){goNext();wl=true;setTimeout(function(){wl=false;},650);}
    else if(e.deltaY<-30&&ST.idx>0){go(ST.idx-1);wl=true;setTimeout(function(){wl=false;},650);}
  },{passive:true});

  // Keyboard (desktop)
  document.addEventListener('keydown',function(e){
    if(!lessonActive()||isQuizCard())return;
    if(e.key==='ArrowUp'||e.key===' '){e.preventDefault();goNext();}
    if(e.key==='ArrowDown'&&ST.idx>0){e.preventDefault();go(ST.idx-1);}
  });
}

// ═══════════════ HELPERS ═══════════════
function curS(){return SUBJECTS.find(function(s){return s.id===ST.cur;})||null;}
function updateXP(){var s=curS();document.getElementById('xp-txt').textContent=(s?(loadP(s.id).xp||0):0)+' XP';}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function dismissA2HS(){var b=document.getElementById('a2hs');if(!b)return;b.style.transition='transform .3s ease,opacity .3s ease';b.style.transform='translateY(110%)';b.style.opacity='0';setTimeout(function(){b.style.display='none';},320);sessionStorage.setItem('a2hs','1');}

// ═══════════════ INIT ═══════════════
tick();setInterval(tick,15000);
buildHome();
bindGestures();
</script>
